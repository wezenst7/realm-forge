<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Teste Firestore</title>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<style>
  body { margin:0; background:#070708; font-family: sans-serif; display:flex; align-items:center; justify-content:center; min-height:100vh; padding:24px; box-sizing:border-box; }
  .box { background:#0d1017; border:1px solid #1e2535; border-radius:16px; padding:32px; max-width:420px; width:100%; }
  h2 { color:#fff; margin:0 0 8px; font-size:20px; }
  p  { color:rgba(255,255,255,0.45); font-size:13px; margin:0 0 24px; line-height:1.6; }
  .step { display:flex; align-items:flex-start; gap:12px; padding:12px 0; border-bottom:1px solid #1a2030; font-size:13px; }
  .step:last-child { border:none; }
  .icon { font-size:18px; flex-shrink:0; margin-top:1px; }
  .label { color:rgba(255,255,255,0.7); }
  .status { margin-left:auto; font-size:11px; font-weight:700; padding:2px 8px; border-radius:99px; flex-shrink:0; }
  .wait   { background:rgba(255,255,255,0.06); color:rgba(255,255,255,0.3); }
  .ok     { background:rgba(62,207,142,0.15); color:#3ecf8e; }
  .fail   { background:rgba(248,113,113,0.15); color:#f87171; }
  .running{ background:rgba(255,170,0,0.12); color:#ffaa00; }
  input { width:100%; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.1); border-radius:8px; padding:10px 12px; color:rgba(255,255,255,0.85); font-size:14px; outline:none; margin-bottom:8px; box-sizing:border-box; font-family:sans-serif; }
  button { width:100%; padding:12px; background:rgba(255,255,255,0.9); border:none; border-radius:8px; color:#070708; font-size:14px; font-weight:700; cursor:pointer; margin-top:8px; font-family:sans-serif; }
  button:disabled { opacity:0.4; cursor:default; }
  .result { margin-top:20px; padding:14px; border-radius:10px; font-size:13px; line-height:1.6; display:none; }
  .result.ok   { background:rgba(62,207,142,0.08); border:1px solid rgba(62,207,142,0.25); color:rgba(80,210,150,0.9); }
  .result.fail { background:rgba(248,113,113,0.08); border:1px solid rgba(248,113,113,0.25); color:rgba(250,140,140,0.9); }
</style>
</head>
<body>
<div class="box">
  <h2>⬡ Teste de Conexão</h2>
  <p>Essa página testa se o Firestore está funcionando corretamente. Entre com seu e-mail e senha do Realm Forge.</p>

  <input id="email" type="email" placeholder="E-mail"/>
  <input id="pass" type="password" placeholder="Senha"/>
  <button id="btn" onclick="runTest()">Iniciar Teste</button>

  <div style="margin-top:20px">
    <div class="step">
      <span class="icon">🔥</span>
      <span class="label">Firebase carregado</span>
      <span class="status" id="s1">aguardando</span>
    </div>
    <div class="step">
      <span class="icon">🔑</span>
      <span class="label">Login com e-mail</span>
      <span class="status wait" id="s2">aguardando</span>
    </div>
    <div class="step">
      <span class="icon">✍️</span>
      <span class="label">Gravação no Firestore</span>
      <span class="status wait" id="s3">aguardando</span>
    </div>
    <div class="step">
      <span class="icon">📖</span>
      <span class="label">Leitura do Firestore</span>
      <span class="status wait" id="s4">aguardando</span>
    </div>
  </div>

  <div class="result" id="result"></div>
</div>

<script>
const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyD6H4QO_bEfeCAhyKXayRiBnmtMrfsw1wA",
  authDomain:        "realm-forge-45b4f.firebaseapp.com",
  projectId:         "realm-forge-45b4f",
  storageBucket:     "realm-forge-45b4f.firebasestorage.app",
  messagingSenderId: "21153058497",
  appId:             "1:21153058497:web:ee6910dc183b440b46ce40"
};

function setStatus(id, state, text) {
  const el = document.getElementById(id);
  el.className = 'status ' + state;
  el.textContent = text;
}

function showResult(ok, msg) {
  const el = document.getElementById('result');
  el.className = 'result ' + (ok ? 'ok' : 'fail');
  el.style.display = 'block';
  el.innerHTML = msg;
}

async function runTest() {
  const btn = document.getElementById('btn');
  btn.disabled = true;
  btn.textContent = 'Testando...';
  document.getElementById('result').style.display = 'none';

  // STEP 1: Firebase loaded
  const fbOk = typeof firebase !== 'undefined' && typeof firebase.firestore === 'function';
  setStatus('s1', fbOk ? 'ok' : 'fail', fbOk ? 'OK' : 'FALHOU');
  if (!fbOk) {
    showResult(false, '❌ <b>Firebase não carregou.</b><br>Verifique sua conexão com a internet e recarregue a página.');
    btn.disabled = false; btn.textContent = 'Tentar novamente';
    return;
  }

  // Init Firebase
  let app, db, auth;
  try {
    app  = firebase.apps.length ? firebase.app() : firebase.initializeApp(FIREBASE_CONFIG);
    db   = firebase.firestore(app);
    auth = firebase.auth(app);
  } catch(e) {
    setStatus('s1', 'fail', 'ERRO');
    showResult(false, '❌ <b>Erro ao inicializar Firebase:</b><br>' + e.message);
    btn.disabled = false; btn.textContent = 'Tentar novamente';
    return;
  }

  // STEP 2: Login
  const email = document.getElementById('email').value.trim();
  const pass  = document.getElementById('pass').value;
  if (!email || !pass) {
    showResult(false, '⚠️ <b>Preencha e-mail e senha</b> para testar.');
    btn.disabled = false; btn.textContent = 'Iniciar Teste';
    return;
  }

  setStatus('s2', 'running', 'testando...');
  let user;
  try {
    const cred = await auth.signInWithEmailAndPassword(email, pass);
    user = cred.user;
    setStatus('s2', 'ok', 'OK');
  } catch(e) {
    setStatus('s2', 'fail', 'FALHOU');
    showResult(false, '❌ <b>Login falhou:</b> ' + e.message + '<br><br>Use as mesmas credenciais do Realm Forge.');
    btn.disabled = false; btn.textContent = 'Tentar novamente';
    return;
  }

  // STEP 3: Write
  setStatus('s3', 'running', 'testando...');
  const testRef = db.doc('_teste_conexao/' + user.uid);
  try {
    await testRef.set({ uid: user.uid, ts: firebase.firestore.FieldValue.serverTimestamp(), ok: true });
    setStatus('s3', 'ok', 'OK');
  } catch(e) {
    setStatus('s3', 'fail', 'FALHOU');
    showResult(false, '❌ <b>Gravação bloqueada.</b><br><br>Código do erro: <b>' + e.code + '</b><br>' + e.message + '<br><br>Isso significa que as regras do Firestore estão bloqueando a escrita. Mande esse erro pro Claude.');
    btn.disabled = false; btn.textContent = 'Tentar novamente';
    return;
  }

  // STEP 4: Read back
  setStatus('s4', 'running', 'testando...');
  try {
    const doc = await testRef.get();
    if (doc.exists && doc.data().ok === true) {
      setStatus('s4', 'ok', 'OK');
      showResult(true, '✅ <b>Tudo funcionando!</b><br><br>O Firestore está gravando e lendo corretamente. O problema do app principal é outro — manda essa mensagem pro Claude: <b>"TESTE OK"</b>');
    } else {
      throw new Error('Documento não encontrado após gravação');
    }
    // Clean up
    await testRef.delete().catch(()=>{});
  } catch(e) {
    setStatus('s4', 'fail', 'FALHOU');
    showResult(false, '❌ <b>Leitura falhou:</b> ' + e.message);
  }

  btn.disabled = false;
  btn.textContent = 'Testar novamente';
}

// Check Firebase on load
window.addEventListener('load', () => {
  const ok = typeof firebase !== 'undefined' && typeof firebase.firestore === 'function';
  setStatus('s1', ok ? 'ok' : 'fail', ok ? 'OK' : 'FALHOU');
});
</script>
</body>
</html>
