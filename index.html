// htm - minimal tagged template literal JSX parser (no external deps)
var htm = (function() {

function build(statics, fields, h_fn) {
  var str = '';
  for (var i = 0; i < statics.length; i++) {
    str += statics[i];
    if (i + 1 < statics.length) str += '\x01' + i + '\x01';
  }
  var pos = 0;
  var root_nodes = [];

  function parseChildren(parent_children) {
    while (pos < str.length) {
      while (pos < str.length && str[pos] <= ' ' && str[pos] !== '\x01') pos++;
      if (pos >= str.length) break;
      if (str[pos] === '<' && str[pos+1] === '/') {
        pos = str.indexOf('>', pos);
        if (pos === -1) pos = str.length; else pos++;
        return;
      }
      if (str[pos] === '<') {
        pos++;
        var isSelfClose = false;
        var tag_start = pos;
        while (pos < str.length && str[pos] !== ' ' && str[pos] !== '\t' && str[pos] !== '\n' && str[pos] !== '>' && str[pos] !== '/' && str[pos] !== '\x01') pos++;
        var tag = str.slice(tag_start, pos).trim();
        if (tag.indexOf('\x01') !== -1) {
          var m = tag.match(/\x01(\d+)\x01/);
          if (m) tag = fields[+m[1]];
        }
        // Handle case where entire tag name is a placeholder: <${MyComp}
        if (!tag && pos < str.length && str[pos] === '\x01') {
          pos++;
          var tag_idx = '';
          while (pos < str.length && str[pos] !== '\x01') tag_idx += str[pos++];
          pos++;
          tag = fields[+tag_idx];
        }
        var props = {};
        var children = [];
        while (pos < str.length) {
          while (pos < str.length && (str[pos] === ' ' || str[pos] === '\t' || str[pos] === '\n' || str[pos] === '\r') && str[pos] !== '\x01') pos++;
          if (pos >= str.length) break;
          var c = str[pos];
          if (c === '>') { pos++; break; }
          if (c === '/' && str[pos+1] === '>') { pos+=2; isSelfClose=true; break; }
          if (c === '.' && str[pos+1] === '.' && str[pos+2] === '.') {
            pos += 3;
            if (str[pos] === '\x01') {
              pos++;
              var idx = '';
              while (pos < str.length && str[pos] !== '\x01') idx += str[pos++];
              pos++;
              var spread = fields[+idx];
              if (spread && typeof spread === 'object') { for (var k in spread) props[k] = spread[k]; }
            }
            continue;
          }
          var attr_start = pos;
          while (pos < str.length && str[pos] !== '=' && str[pos] !== ' ' && str[pos] !== '\t' && str[pos] !== '\n' && str[pos] !== '>' && str[pos] !== '/' && str[pos] !== '\x01') pos++;
          var attr_name = str.slice(attr_start, pos).trim();
          if (!attr_name) { pos++; continue; }
          if (pos < str.length && str[pos] === '=') {
            pos++;
            var attr_val;
            if (str[pos] === '\x01') {
              pos++;
              var idx = '';
              while (pos < str.length && str[pos] !== '\x01') idx += str[pos++];
              pos++;
              attr_val = fields[+idx];
            } else if (str[pos] === '"' || str[pos] === "'") {
              var q = str[pos++], v_start = pos, v_parts = [];
              while (pos < str.length && str[pos] !== q) {
                if (str[pos] === '\x01') {
                  if (pos > v_start) v_parts.push(str.slice(v_start, pos));
                  pos++;
                  var idx = '';
                  while (pos < str.length && str[pos] !== '\x01') idx += str[pos++];
                  pos++;
                  v_parts.push(fields[+idx]);
                  v_start = pos;
                } else pos++;
              }
              if (pos > v_start) v_parts.push(str.slice(v_start, pos));
              pos++;
              attr_val = v_parts.length === 1 ? v_parts[0] : v_parts.join('');
            } else {
              var v_start = pos;
              while (pos < str.length && str[pos] !== ' ' && str[pos] !== '>' && str[pos] !== '\n') pos++;
              attr_val = str.slice(v_start, pos);
            }
            props[attr_name] = attr_val;
          } else if (str[pos] === '\x01') {
            pos++;
            var idx = '';
            while (pos < str.length && str[pos] !== '\x01') idx += str[pos++];
            pos++;
            props[attr_name] = fields[+idx];
          } else {
            props[attr_name] = true;
          }
        }
        if (isSelfClose) {
          parent_children.push(h_fn(tag, props));
        } else {
          parseChildren(children);
          var final_props = props;
          if (children.length === 1) final_props.children = children[0];
          else if (children.length > 1) final_props.children = children;
          parent_children.push(h_fn(tag, final_props));
        }
      } else {
        var parts = [], t_start = pos;
        while (pos < str.length && str[pos] !== '<') {
          if (str[pos] === '\x01') {
            if (pos > t_start) { var t = str.slice(t_start, pos).trim(); if (t) parts.push(t); }
            pos++;
            var idx = '';
            while (pos < str.length && str[pos] !== '\x01') idx += str[pos++];
            pos++;
            var v = fields[+idx];
            if (v !== null && v !== undefined && v !== false && v !== '') parts.push(v);
            t_start = pos;
          } else pos++;
        }
        if (pos > t_start) { var t = str.slice(t_start, pos).trim(); if (t) parts.push(t); }
        for (var pi = 0; pi < parts.length; pi++) parent_children.push(parts[pi]);
      }
    }
  }

  parseChildren(root_nodes);
  return root_nodes.length === 1 ? root_nodes[0] : root_nodes.length > 1 ? root_nodes : null;
}

return {
  bind: function(h_fn) {
    return function(statics) {
      var fields = Array.prototype.slice.call(arguments, 1);
      return build(statics, fields, h_fn);
    };
  }
};

})();

// Migrate communities to new tab + fullscreen-chat structure
function migrateComm(c) {
  const gcs = (c.groupChats||[]).map(g=>({...g, isOpen:g.isOpen!==false, pendingMembers:g.pendingMembers||[]}));
  // If already migrated (no per-chat tabs with chatId links)
  if (c.tabs && !c.tabs.some(t=>t.chatId)) {
    return {...c, groupChats:gcs, moderators:c.moderators||[], tabContent:c.tabContent||{}};
  }
  // Build fresh tabs: strip old per-chat tabs, keep others
  let tabs = c.tabs ? c.tabs.filter(t=>!t.chatId) : [{id:"t_feed_"+c.id, name:"Posts", type:"feed", icon:"◇", order:0}];
  if (gcs.length > 0 && !tabs.find(t=>t.type==="chat")) {
    tabs.push({id:"t_chats_"+c.id, name:"Chats", type:"chat", icon:"⬡", order:999});
  }
  return {...c, groupChats:gcs, tabs, moderators:c.moderators||[], tabContent:c.tabContent||{}};
}

function modN(v) { return Math.floor(((v||10)-10)/2); }
function modStr(v) { const m = modN(v); return m >= 0 ? "+" + m : "" + m; }
function rollD(n) { return Math.floor(Math.random()*n)+1; }
function nowTs() { return new Date().toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"}); }

function initials(n) { return (n||"?").trim().split(" ").filter(Boolean).map(w=>w[0]).join("").toUpperCase().slice(0,2)||"?"; }
function hsl(h,s,l,a) { return a!=null ? "hsla("+h+","+s+"%,"+l+"%,"+a+")" : "hsl("+h+","+s+"%,"+l+"%)"; }
function isMobile() { return window.innerWidth <= 768; }
function xpPct(xp,lvl) { if(lvl>=20) return 100; const base=XP_LVL[lvl]||0, next=XP_LVL[lvl+1]||1; return Math.min(100,Math.max(0,((xp-base)/(next-base))*100)); }
function initSlots(cls,lvl) { if(!CASTERS.includes(cls)) return []; return (SPELL_SLOTS[lvl]||[]).map(n=>({max:n,used:0})); }
function compressPhoto(file, cb, size=80) {
  const img = new Image(), url = URL.createObjectURL(file);
  img.onload = () => {
    const c = document.createElement("canvas"); c.width = c.height = size;
    const ctx = c.getContext("2d"), min = Math.min(img.width,img.height);
    ctx.drawImage(img,(img.width-min)/2,(img.height-min)/2,min,min,0,0,size,size);
    cb(c.toDataURL("image/jpeg",0.78)); URL.revokeObjectURL(url);
  };
  img.onerror = ()=>URL.revokeObjectURL(url);
  img.src = url;
}

const SFX = (function() {
  let ctx = null, on = true;
  function gc() { if(!ctx) try { ctx = new (window.AudioContext||window.webkitAudioContext)(); } catch(e) {} return ctx; }
  function tone(f,d,v,type) { const c=gc(); if(!c||!on) return; const g=c.createGain(), o=c.createOscillator(); g.gain.setValueAtTime(v||0.15,c.currentTime); g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+d); o.connect(g); g.connect(c.destination); o.type=type||"sine"; o.frequency.value=f; o.start(); o.stop(c.currentTime+d); }
  return {
    dice: () => { tone(220,0.06,0.12,"square"); setTimeout(()=>tone(440,0.08,0.1),60); setTimeout(()=>tone(660,0.1,0.12),130); },
    send: () => { tone(880,0.04,0.06); setTimeout(()=>tone(1100,0.05,0.05),40); },
    lvlup: () => { [262,330,392,523,659,784].forEach((f,i)=>setTimeout(()=>tone(f,0.18,0.15),i*80)); },
    notify: () => { tone(1000,0.06,0.08); setTimeout(()=>tone(1200,0.08,0.07),70); },
    toggle: (v) => { on = v; }
  };
})();

// ── FLOAT WINDOW ──────────────────────────────────────────────────────────────
function FloatWindow({title,icon,color,children,initPos,initSize,minW=260,minH=180,zIdx,onFocus,onClose,onMin,minimized,hdrExtra}) {
  const posRef  = useRef(initPos||{x:80,y:50});
  const sizeRef = useRef(initSize||{w:420,h:480});
  const dragging = useRef(false), resizing = useRef(false);
  const dOrig = useRef({}), rOrig = useRef({});
  const winRef = useRef(null);

  function startDrag(e) {
    if (e.target.closest("[data-nd]")) return;
    e.preventDefault(); if(onFocus) onFocus(); dragging.current = true;
    dOrig.current = {mx:e.clientX,my:e.clientY,wx:posRef.current.x,wy:posRef.current.y};
    const mv = ev => { if(!dragging.current) return; const nx=Math.max(0,dOrig.current.wx+(ev.clientX-dOrig.current.mx)), ny=Math.max(0,dOrig.current.wy+(ev.clientY-dOrig.current.my)); posRef.current={x:nx,y:ny}; if(winRef.current){winRef.current.style.left=nx+"px";winRef.current.style.top=ny+"px";} };
    const up = () => { dragging.current=false; window.removeEventListener("mousemove",mv); window.removeEventListener("mouseup",up); };
    window.addEventListener("mousemove",mv); window.addEventListener("mouseup",up);
  }
  function startResize(e) {
    e.preventDefault(); e.stopPropagation(); if(onFocus) onFocus(); resizing.current = true;
    rOrig.current = {mx:e.clientX,my:e.clientY,w:sizeRef.current.w,h:sizeRef.current.h};
    const mv = ev => { if(!resizing.current) return; const nw=Math.max(minW,rOrig.current.w+(ev.clientX-rOrig.current.mx)), nh=Math.max(minH,rOrig.current.h+(ev.clientY-rOrig.current.my)); sizeRef.current={w:nw,h:nh}; if(winRef.current){winRef.current.style.width=nw+"px";winRef.current.style.height=nh+"px";} };
    const up = () => { resizing.current=false; window.removeEventListener("mousemove",mv); window.removeEventListener("mouseup",up); };
    window.addEventListener("mousemove",mv); window.addEventListener("mouseup",up);
  }

  if (minimized) return null;
  const p = posRef.current, sz = sizeRef.current;
  return html`
    <div ref=${winRef} onMouseDown=${()=>{if(onFocus)onFocus();}}
      style=${{position:"absolute",left:p.x,top:p.y,width:sz.w,height:sz.h,zIndex:zIdx||10,display:"flex",flexDirection:"column",background:"rgba(9,9,12,0.98)",border:"1px solid rgba(255,255,255,0.09)",borderRadius:12,boxShadow:"0 24px 70px rgba(0,0,0,0.8)",overflow:"hidden",userSelect:"none",pointerEvents:"all"}}>
      <div onMouseDown=${startDrag}
        style=${{display:"flex",alignItems:"center",gap:7,padding:"8px 11px",background:"rgba(255,255,255,0.025)",borderBottom:"1px solid rgba(255,255,255,0.06)",cursor:"grab",flexShrink:0}}>
        <span style=${{fontSize:11,color:color||"#fff",fontFamily:"monospace",opacity:0.8}}>${icon}</span>
        <span style=${{flex:1,fontSize:12,fontWeight:700,color:"rgba(255,255,255,0.65)",letterSpacing:"0.04em",pointerEvents:"none"}}>${title}</span>
        ${hdrExtra && html`<div data-nd style=${{marginRight:4}}>${hdrExtra}</div>`}
        <div data-nd style=${{display:"flex",gap:4}}>
          <button onClick=${onMin} style=${{width:17,height:17,borderRadius:"50%",background:"rgba(230,170,50,0.8)",border:"none",cursor:"pointer",fontSize:10,color:"#000",display:"flex",alignItems:"center",justifyContent:"center"}}>-</button>
          <button onClick=${onClose} style=${{width:17,height:17,borderRadius:"50%",background:"rgba(210,60,55,0.8)",border:"none",cursor:"pointer",fontSize:10,color:"#fff",display:"flex",alignItems:"center",justifyContent:"center"}}>x</button>
        </div>
      </div>
      <div style=${{flex:1,overflow:"hidden",display:"flex",flexDirection:"column"}}>${children}</div>
      <div onMouseDown=${startResize} style=${{position:"absolute",bottom:0,right:0,width:14,height:14,cursor:"se-resize"}}/>
    </div>`;
}

// ── SUBMIT BUTTON (anti-spam: disables while loading) ─────────────────────────
function SubmitBtn({onClick, label}) {
  const [busy, setBusy] = useState(false);
  async function handle() {
    if (busy) return;
    setBusy(true);
    try { await onClick(); } catch(e) { console.error(e); }
    finally { setBusy(false); }
  }
  return html`
    <button onClick=${handle} disabled=${busy}
      style=${{...S.btnP, opacity:busy?0.6:1, cursor:busy?"default":"pointer", position:"relative"}}>
      ${busy ? "..." : label}
    </button>`;
}

// ── POST CARD ─────────────────────────────────────────────────────────────────
function PostCard({post,communityId,communityName,currentUser,getUser,onLike,onComment,onOpenComm,onEditPost,onDeletePost,canModerate}) {
  const [open,setOpen]=useState(false);
  const [cmt,setCmt]=useState("");
  const [showActions,setShowActions]=useState(false);
  const [editing,setEditing]=useState(false);
  const [editText,setEditText]=useState(post.content||"");
  const [confirmDel,setConfirmDel]=useState(false);
  const author=getUser(post.authorId),liked=post.likes.includes(currentUser.id),mh=CLASS_HUE[author.cls]||240;
  const isOwn=post.authorId===currentUser.id;
  const canEdit=isOwn;
  const canDel=isOwn||canModerate;

  return html`
    <div style=${{background:"rgba(255,255,255,0.025)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:14,padding:"14px",marginBottom:11,animation:"fadeUp 0.3s ease both"}}>
      ${communityName&&onOpenComm && html`<button onClick=${()=>onOpenComm(communityId)} style=${{background:"none",border:"none",color:"rgba(255,255,255,0.22)",fontSize:10,letterSpacing:"0.1em",textTransform:"uppercase",cursor:"pointer",fontFamily:"inherit",padding:"0 0 7px",display:"block"}}>◈ ${communityName}</button>`}
      <div style=${{display:"flex",alignItems:"center",gap:9,marginBottom:9}}>
        <${UserAvatar} user=${author} size=${30}/>
        <div style=${{flex:1}}>
          <div style=${{fontSize:13,fontWeight:700,color:"rgba(255,255,255,0.8)"}}>${author.name}</div>
          <div style=${{fontSize:9,color:"rgba(255,255,255,0.28)",textTransform:"uppercase",letterSpacing:"0.06em"}}>${author.cls} · ${post.ts}${post.edited?" · editado":""}</div>
        </div>
        ${(canEdit||canDel) && html`
          <button onClick=${()=>{setShowActions(o=>!o);setConfirmDel(false);}} style=${{background:"none",border:"none",color:"rgba(255,255,255,0.3)",cursor:"pointer",fontSize:18,padding:"0 4px",lineHeight:1,flexShrink:0}}>⋯</button>`}
      </div>

      ${showActions && html`
        <div style=${{display:"flex",gap:6,marginBottom:10,padding:"8px",background:"rgba(255,255,255,0.03)",borderRadius:8,flexWrap:"wrap"}}>
          ${canEdit&&!editing && html`<button onClick=${()=>{setEditing(true);setEditText(post.content);setShowActions(false);}} style=${{...S.micro,fontSize:11,padding:"5px 10px"}}>✏ Editar</button>`}
          ${canDel&&!confirmDel && html`<button onClick=${()=>setConfirmDel(true)} style=${{...S.micro,fontSize:11,padding:"5px 10px",color:"rgba(200,80,80,0.8)"}}>Apagar</button>`}
          ${confirmDel && html`
            <div style=${{display:"flex",gap:6,alignItems:"center",width:"100%"}}>
              <span style=${{fontSize:12,color:"rgba(220,100,100,0.85)",flex:1}}>Confirmar exclusão?</span>
              <button onClick=${()=>{if(onDeletePost)onDeletePost(communityId,post.id);setShowActions(false);setConfirmDel(false);}} style=${{...S.micro,fontSize:11,background:"rgba(200,60,60,0.15)",borderColor:"rgba(200,60,60,0.35)",color:"rgba(220,100,100,0.9)"}}>Apagar</button>
              <button onClick=${()=>setConfirmDel(false)} style=${{...S.micro,fontSize:11}}>Cancelar</button>
            </div>`}
          <button onClick=${()=>setShowActions(false)} style=${{...S.micro,fontSize:11,marginLeft:"auto"}}>Fechar</button>
        </div>`}

      ${editing
        ? html`
          <div style=${{marginBottom:10}}>
            <textarea value=${editText} onChange=${e=>setEditText(e.target.value)} rows=${4}
              style=${{...S.fIn,resize:"vertical",lineHeight:1.7,fontSize:13,marginBottom:7}}/>
            <div style=${{display:"flex",gap:6}}>
              <button onClick=${()=>{if(editText.trim()&&onEditPost){onEditPost(communityId,post.id,editText.trim());}setEditing(false);}} style=${{...S.btnP,fontSize:11}}>Salvar</button>
              <button onClick=${()=>setEditing(false)} style=${{...S.micro,fontSize:11}}>Cancelar</button>
            </div>
          </div>`
        : html`<p style=${{margin:"0 0 10px",fontSize:14,lineHeight:1.75,color:"rgba(255,255,255,0.72)"}}>${post.content}</p>`}

      ${(post.tags||[]).length>0 && html`
        <div style=${{display:"flex",gap:5,flexWrap:"wrap",marginBottom:9}}>
          ${post.tags.map(t=>html`<span key=${t} style=${{fontSize:10,background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:10,padding:"2px 8px",color:"rgba(255,255,255,0.38)"}}>${t}</span>`)}
        </div>`}
      <div style=${{display:"flex",gap:12}}>
        <button onClick=${()=>onLike(communityId,post.id)} style=${{background:"none",border:"none",cursor:"pointer",fontFamily:"inherit",fontSize:13,color:liked?"rgba(220,72,72,0.95)":"rgba(255,255,255,0.35)",display:"flex",alignItems:"center",gap:4}}>${liked?"♥":"♡"}<span style=${{fontSize:12}}>${post.likes.length}</span></button>
        <button onClick=${()=>setOpen(o=>!o)} style=${{background:"none",border:"none",cursor:"pointer",fontFamily:"inherit",fontSize:13,color:"rgba(255,255,255,0.35)",display:"flex",alignItems:"center",gap:4}}>◇<span style=${{fontSize:12}}>${post.comments.length}</span></button>
      </div>
      ${open && html`
        <div style=${{marginTop:10,borderTop:"1px solid rgba(255,255,255,0.06)",paddingTop:10}}>
          ${post.comments.map(cm=>{const ca=getUser(cm.authorId); return html`
            <div key=${cm.id} style=${{display:"flex",gap:8,marginBottom:8}}>
              <${UserAvatar} user=${ca} size=${20}/>
              <div><span style=${{fontSize:12,color:"rgba(255,255,255,0.55)",fontWeight:600}}>${ca.name}: </span><span style=${{fontSize:12,color:"rgba(255,255,255,0.42)"}}>${cm.text}</span></div>
            </div>`;})}
          <div style=${{display:"flex",gap:6,marginTop:7}}>
            <input value=${cmt} onChange=${e=>setCmt(e.target.value)} placeholder="Comentar..." onKeyDown=${e=>{if(e.key==="Enter"&&cmt.trim()){onComment(communityId,post.id,cmt);setCmt("");}}} style=${{flex:1,background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:8,padding:"7px 10px",color:"rgba(255,255,255,0.78)",fontSize:12,outline:"none",fontFamily:"inherit"}}/>
            <button onClick=${()=>{if(cmt.trim()){onComment(communityId,post.id,cmt);setCmt("");}}} style=${{...S.addBtn,fontSize:16}}>↑</button>
          </div>
        </div>`}
    </div>`;
}

// ── FEED VIEW ─────────────────────────────────────────────────────────────────
function FeedView({communities,currentUser,feedSearch,setFeedSearch,onOpenComm,onCreateComm,canCreate,appConfig,myVIP}) {
  const q = feedSearch.trim().toLowerCase();
  const sorted = [...communities]
    .filter(c => !q || c.name.toLowerCase().includes(q) || (c.desc||"").toLowerCase().includes(q))
    .sort((a,b) => b.members.length - a.members.length);

  return html`
    <div style=${{flex:1,overflowY:"auto"}}>
      <div style=${{maxWidth:600,width:"100%",margin:"0 auto",padding:"16px 14px"}}>

        <div style=${{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
          <div style=${{flex:1,fontSize:19,fontWeight:800,color:"rgba(255,255,255,0.88)",letterSpacing:"0.02em"}}>Comunidades</div>
          ${canCreate
            ? html`<button onClick=${onCreateComm} style=${S.btnP}>+ Nova</button>`
            : html`<button onClick=${onCreateComm} style=${{...S.micro,fontSize:10,opacity:0.5}} title="Seja VIP para criar">VIP</button>`}
        </div>

        ${!myVIP && appConfig && html`<${AdBanner} config=${appConfig}/>`}

        <input value=${feedSearch} onChange=${e=>setFeedSearch(e.target.value)}
          placeholder="Buscar comunidade..." style=${{...S.fIn,marginBottom:16,fontSize:14,padding:"10px 14px"}}/>

        ${sorted.length===0 && html`<${Muted} icon="⬡" label="Nenhuma comunidade" sub=${q?"Nenhum resultado para a busca":"Crie a primeira comunidade!"}/>`}

        ${sorted.map(c=>{
          const isMember = (c.memberIds||c.members||[]).includes(currentUser.id||"");
          const isOwner  = c.ownerId === (currentUser.id||"");
          const totalPosts = (c.posts||[]).length;
          const totalChats = (c.groupChats||[]).length;
          const memberCount = (c.memberIds||c.members||[]).length;
          return html`
            <div key=${c.id} onClick=${()=>onOpenComm(c.id)}
              style=${{background:"rgba(255,255,255,0.025)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:16,padding:"16px",marginBottom:12,cursor:"pointer",animation:"fadeUp 0.3s ease both",active:"background:rgba(255,255,255,0.05)"}}>
              <div style=${{display:"flex",gap:12,alignItems:"flex-start"}}>
                <div style=${{width:52,height:52,borderRadius:13,overflow:"hidden",flexShrink:0,background:"rgba(255,255,255,0.07)",border:"1px solid rgba(255,255,255,0.1)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,fontWeight:700,color:"rgba(255,255,255,0.45)"}}>
                  ${c.iconUrl
                    ? html`<img src=${c.iconUrl} style=${{width:52,height:52,objectFit:"cover"}} alt=""/>`
                    : initials(c.name)}
                </div>
                <div style=${{flex:1,minWidth:0}}>
                  <div style=${{display:"flex",alignItems:"center",gap:7,marginBottom:3,flexWrap:"wrap"}}>
                    <span style=${{fontSize:16,fontWeight:800,color:c.themeColor!==null&&c.themeColor!==undefined?"hsl("+c.themeColor+",60%,72%)":"rgba(255,255,255,0.9)"}}>${c.name}</span>
                    ${isOwner && html`<span style=${{fontSize:9,background:"rgba(100,180,240,0.12)",border:"1px solid rgba(100,180,240,0.25)",borderRadius:8,padding:"2px 7px",color:"rgba(100,180,240,0.8)"}}>Dono</span>`}
                    ${isMember&&!isOwner && html`<span style=${{fontSize:9,background:"rgba(80,200,110,0.1)",border:"1px solid rgba(80,200,110,0.2)",borderRadius:8,padding:"2px 7px",color:"rgba(80,200,110,0.8)"}}>Membro</span>`}
                  </div>
                  ${c.desc && html`<p style=${{margin:"0 0 8px",fontSize:13,lineHeight:1.55,color:"rgba(255,255,255,0.5)",overflow:"hidden",display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical"}}>${c.desc}</p>`}
                  <div style=${{display:"flex",gap:14}}>
                    <span style=${{fontSize:11,color:"rgba(255,255,255,0.35)"}}>${memberCount} membro${memberCount!==1?"s":""}</span>
                    ${totalPosts>0 && html`<span style=${{fontSize:11,color:"rgba(255,255,255,0.28)"}}>◇ ${totalPosts} post${totalPosts!==1?"s":""}</span>`}
                    ${totalChats>0 && html`<span style=${{fontSize:11,color:"rgba(255,255,255,0.28)"}}>⬡ ${totalChats} chat${totalChats!==1?"s":""}</span>`}
                  </div>
                </div>
                <span style=${{fontSize:18,color:"rgba(255,255,255,0.2)",flexShrink:0,alignSelf:"center"}}>›</span>
              </div>
            </div>`;
        })}
      </div>
    </div>`;
}

      ${(community.members||community.memberIds||[]).map(mid=>{const u=getUser(mid),isMod=mods.includes(mid),isOwnerM=mid===community.ownerId,isCurrentUser=mid===currentUser.id; return html`

            </div>

          </div>
          <div style=${{display:"flex",gap:4,flexShrink:0,alignItems:"center"}}>
            ${!isCurrentUser && html`<button onClick=${()=>onOpenDM(mid)} style=${{...S.gmb,fontSize:11,padding:"4px 8px"}}>◉</button>`}

            ${canManage&&!isCurrentUser&&!isOwnerM && html`<button onClick=${()=>onBanUser&&onBanUser(mid)} style=${{...S.gmb,fontSize:9,padding:"3px 7px",color:"rgba(200,70,70,0.8)"}}>Banir</button>`}

        <div style=${{marginTop:8}}>

                ${otherMembers.map(mid=>{const u=getUser(mid);return html`
                  <div key=${mid} style=${{display:"flex",alignItems:"center",gap:9,padding:"7px 0",borderBottom:"1px solid rgba(255,255,255,0.05)"}}>

                    <button onClick=${()=>{onTransfer(mid);setTransferMode(false);}} style=${{...S.gmb,fontSize:10,background:"rgba(220,180,50,0.12)",borderColor:"rgba(220,180,50,0.3)",color:"rgba(220,180,50,0.9)",padding:"5px 10px"}}>Transferir</button>

                <button onClick=${()=>setTransferMode(false)} style=${{...S.micro,width:"100%",textAlign:"center",marginTop:8,fontSize:11}}>Cancelar</button>

            : html`
              <div style=${{background:"rgba(200,60,60,0.08)",border:"1px solid rgba(200,60,60,0.25)",borderRadius:10,padding:"12px"}}>

            ? html`<button onClick=${()=>setConfirmLeave(true)} style=${{...S.micro,width:"100%",textAlign:"center",padding:"11px",background:"rgba(200,60,60,0.07)",borderColor:"rgba(200,60,60,0.25)",color:"rgba(210,80,80,0.85)"}}>← Sair da comunidade</button>`

            <div style=${{display:"flex",alignItems:"center",gap:5,marginTop:2}}>
              <div style=${{fontSize:10,color:"rgba(255,255,255,0.18)"}}>${(community.members||community.memberIds||[]).length} membro${community.members.length!==1?"s":""}</div>

        ${!(community.members||community.memberIds||[]).includes(currentUser.id||"") && html`<button style=${{...S.micro,marginTop:6,width:"100%",textAlign:"center"}} onClick=${onJoin}>Entrar</button>`}
        ${(community.members||community.memberIds||[]).includes(currentUser.id||"") && html`<button style=${{...S.micro,marginTop:4,width:"100%",textAlign:"center",fontSize:10}} onClick=${()=>onCopyInvite(community.id)}>Copiar convite</button>`}
        ${isOwner && html`<button style=${{...S.micro,marginTop:4,width:"100%",textAlign:"center",fontSize:10,background:"rgba(100,180,240,0.07)",borderColor:"rgba(100,180,240,0.25)",color:"rgba(100,180,240,0.8)"}} onClick=${onSheetBuilder}>${customSheet?"Editar ficha":"Ficha personalizada"}</button>`}
        ${isOwner && html`<button style=${{...S.micro,marginTop:4,width:"100%",textAlign:"center",fontSize:10}} onClick=${onEditComm}>⚙ Editar comunidade</button>`}
        ${(community.members||community.memberIds||[]).includes(currentUser.id||"") && html`<button style=${{...S.micro,marginTop:4,width:"100%",textAlign:"center",fontSize:10,background:"rgba(255,255,255,0.07)"}} onClick=${onCreatePost}>✍ Criar Post</button>`}
      </div>

      <div style=${{height:1,background:"rgba(255,255,255,0.06)",margin:"0 12px"}}/>

      <div style=${{display:"flex",alignItems:"center",padding:"7px 12px 2px"}}>
        <div style=${{fontSize:9,letterSpacing:"0.14em",textTransform:"uppercase",color:"rgba(255,255,255,0.2)",flex:1}}>Abas</div>
        ${canManage && html`<button title="Nova aba" onClick=${onCreateTab} style=${{background:"none",border:"none",color:"rgba(255,255,255,0.22)",cursor:"pointer",fontSize:14,lineHeight:1,padding:"0 0 0 4px"}}>+</button>`}
      </div>

      ${tabs.map(tab => {

        return html`
          <div key=${tab.id} style=${{display:"flex",alignItems:"center",paddingRight:4}}>
            <${SbBtn}
              active=${isActive}
              glyph=${tab.icon||ttDef.icon}
              label=${tab.name}
              sub=${tab.type==="chat"?"Lista de chats":(TAB_TYPES.find(t=>t.id===tab.type)||{label:""}).label}

        <div style=${{padding:"4px 10px 6px"}}>
          ${canManage
            ? html`<button style=${{...S.micro,width:"100%",textAlign:"center",fontSize:10,opacity:0.7}} onClick=${onCreateTab}>+ Nova aba</button>`
            : (canCreate
              ? html`<button style=${{...S.micro,width:"100%",textAlign:"center",fontSize:10,opacity:0.7}} onClick=${onCreateChat}>+ Chat</button>`

          }

      <div style=${{height:1,background:"rgba(255,255,255,0.06)",margin:"2px 12px 0"}}/>

        <div style=${{fontSize:9,letterSpacing:"0.14em",textTransform:"uppercase",color:"rgba(255,255,255,0.2)",flex:1,textAlign:"left"}}>Membros</div>
        <span style=${{fontSize:9,color:"rgba(255,255,255,0.18)"}}>${showMembers?"▲":"▼"}</span>
      </button>

      ${showMembers && (community.members||community.memberIds||[]).map(mid=>{const u=getUser(mid),uh=CLASS_HUE[u.cls]||240,isModerator=mods.includes(mid),isOwnerM=mid===community.ownerId; return html`
        <div key=${mid} style=${{display:"flex",alignItems:"center",gap:7,padding:"4px 12px",cursor:mid!==currentUser.id?"pointer":"default"}}

          onContextMenu=${e=>{e.preventDefault();if(onViewProfile) onViewProfile(mid);}}>

          <span style=${{fontSize:11,color:"rgba(255,255,255,0.36)",flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>${u.name}</span>
          ${isOwnerM && html`<span title="Dono" style=${{fontSize:8,color:"rgba(100,180,240,0.55)"}}>⬡</span>`}
          ${isModerator&&!isOwnerM && html`<span title="Administrador" style=${{fontSize:8,color:"rgba(220,180,50,0.55)"}}>◈</span>`}
          ${mid===currentUser.id && html`<span style=${{fontSize:8,color:"rgba(255,255,255,0.14)"}}>eu</span>`}
        </div>`;})}

      ${isOwner && html`
        <div style=${{height:1,background:"rgba(255,255,255,0.06)",margin:"4px 12px"}}/>
        <button onClick=${()=>setShowModMgmt(o=>!o)} style=${{display:"flex",alignItems:"center",padding:"6px 12px",background:"none",border:"none",cursor:"pointer",width:"100%",fontFamily:"inherit"}}>
          <div style=${{fontSize:9,letterSpacing:"0.12em",textTransform:"uppercase",color:"rgba(100,180,240,0.45)",flex:1,textAlign:"left"}}>Moderadores</div>
          <span style=${{fontSize:9,color:"rgba(255,255,255,0.16)"}}>${showModMgmt?"▲":"▼"}</span>
        </button>
        ${showModMgmt && html`
          <div style=${{padding:"0 10px 8px"}}>
            ${mods.length===0 && html`<div style=${{fontSize:10,color:"rgba(255,255,255,0.2)",padding:"2px 2px"}}>Sem moderadores.</div>`}
            ${mods.map(mid=>{const u=getUser(mid); return html`
              <div key=${mid} style=${{display:"flex",alignItems:"center",gap:5,padding:"3px 0"}}>
                <span style=${{fontSize:11,color:"rgba(220,180,50,0.7)",flex:1}}>${u.name}</span>
                <button onClick=${()=>onRemoveMod(mid)} style=${{...S.gmb,fontSize:9,padding:"2px 6px",color:"rgba(210,80,80,0.7)"}}>−</button>
              </div>`;})}
            <div style=${{marginTop:5}}>
              <select onChange=${e=>{if(e.target.value){onAddMod(e.target.value);e.target.value="";}}} style=${{...S.fSel,fontSize:11,padding:"5px 8px"}}>
                <option value="">+ Promover membro...</option>
                ${(community.members||community.memberIds||[]).filter(mid=>mid!==community.ownerId&&!mods.includes(mid)).map(mid=>{const u=getUser(mid);return html`<option key=${mid} value=${mid}>${u.name}</option>`;})}
              </select>
            </div>
          </div>`}`}
    </div>`;
}

function TabAnnouncements({tab, community, currentUser, canManage, onAdd, onRemove}) {
  const [title, setTitle] = useState("");
  const [body, setBody] = useState("");
  const [open, setOpen] = useState(false);
  const items = (community.tabContent||{})[tab.id] || [];
  return html`
    <div style=${{flex:1,overflowY:"auto"}}>
      <div style=${{maxWidth:560,width:"100%",margin:"0 auto",padding:"18px 14px"}}>
        <div style=${{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
          <div><div style=${{fontSize:15,fontWeight:800,color:"rgba(255,255,255,0.78)"}}>${tab.name}</div><div style=${{fontSize:11,color:"rgba(255,255,255,0.28)"}}>${community.name}</div></div>
          ${canManage && html`<button onClick=${()=>setOpen(o=>!o)} style=${S.btnP}>${open?"Fechar":"+ Anúncio"}</button>`}
        </div>
        ${canManage && open && html`
          <div style=${{background:"rgba(255,255,255,0.025)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:10,padding:"14px",marginBottom:14}}>
            <input value=${title} onChange=${e=>setTitle(e.target.value)} placeholder="Título do anúncio" style=${{...S.fIn,marginBottom:8}}/>
            <textarea value=${body} onChange=${e=>setBody(e.target.value)} rows=${4} placeholder="Conteúdo..." style=${{...S.fIn,resize:"none",marginBottom:8}}/>
            <button onClick=${()=>{if(!title.trim()&&!body.trim())return;onAdd(tab.id,{id:uid(),authorId:currentUser.id,title:title.trim(),content:body.trim(),ts:nowTs(),createdAt:Date.now()});setTitle("");setBody("");setOpen(false);}} style=${S.btnP}>Publicar Anúncio</button>
          </div>`}
        ${items.length===0 && html`<${Muted} icon="📢" label="Nenhum anúncio" sub="Aguarde novidades"/>`}
        ${[...items].reverse().map(item=>html`
          <div key=${item.id} style=${{background:"rgba(220,170,50,0.04)",border:"1px solid rgba(220,170,50,0.14)",borderRadius:12,padding:"14px",marginBottom:10,animation:"fadeUp 0.3s ease both"}}>
            <div style=${{display:"flex",alignItems:"flex-start",gap:8,marginBottom:7}}>
              <span style=${{fontSize:14}}>📢</span>
              <div style=${{flex:1}}>
                <div style=${{fontSize:14,fontWeight:700,color:"rgba(255,255,255,0.85)"}}>${item.title||"Anúncio"}</div>
                <div style=${{fontSize:9,color:"rgba(255,255,255,0.26)",marginTop:2}}>${item.ts}</div>
              </div>
              ${canManage && html`<button onClick=${()=>onRemove(tab.id,item.id)} style=${{background:"none",border:"none",color:"rgba(255,255,255,0.2)",cursor:"pointer",fontSize:14,lineHeight:1}}>×</button>`}
            </div>
            ${item.content && html`<p style=${{margin:0,fontSize:13,lineHeight:1.7,color:"rgba(255,255,255,0.6)"}}>${item.content}</p>`}
          </div>`)}
      </div>
    </div>`;
}

function TabWiki({tab, community, currentUser, canManage, onUpdate}) {
  const wikiData = ((community.tabContent||{})[tab.id]||[])[0]||{content:"",lastEditBy:null,lastEditTs:null};
  const [editing, setEditing] = useState(false);
  const [draft, setDraft] = useState(wikiData.content||"");
  useEffect(()=>setDraft(wikiData.content||""),[wikiData.content]);
  return html`
    <div style=${{flex:1,overflowY:"auto"}}>
      <div style=${{maxWidth:620,width:"100%",margin:"0 auto",padding:"18px 14px"}}>
        <div style=${{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
          <div><div style=${{fontSize:15,fontWeight:800,color:"rgba(255,255,255,0.78)"}}>${tab.name}</div>${wikiData.lastEditTs&&html`<div style=${{fontSize:10,color:"rgba(255,255,255,0.22)"}}>Última edição: ${wikiData.lastEditTs}</div>`}</div>
          ${canManage && html`<button onClick=${()=>{if(editing){onUpdate(tab.id,[{...wikiData,content:draft,lastEditBy:currentUser.id,lastEditTs:nowTs()}]);setEditing(false);}else setEditing(true);}} style=${S.btnP}>${editing?"💾 Salvar":"✏ Editar"}</button>`}
        </div>
        ${editing
          ? html`<textarea value=${draft} onChange=${e=>setDraft(e.target.value)} rows=${20} placeholder="Escreva aqui..." style=${{...S.fIn,resize:"vertical",lineHeight:1.75,fontSize:13}}/>`
          : (wikiData.content
              ? html`<div style=${{fontSize:14,lineHeight:1.85,color:"rgba(255,255,255,0.65)",whiteSpace:"pre-wrap"}}>${wikiData.content}</div>`
              : html`<${Muted} icon="📖" label=${canManage?"Wiki vazia":"Nenhum conteúdo"} sub=${canManage?"Clique em Editar para começar":"Aguarde o conteúdo ser adicionado"}/>`)
        }
      </div>
    </div>`;
}

function TabEvents({tab, community, currentUser, canManage, onAdd, onRemove}) {
  const [title, setTitle] = useState("");
  const [date, setDate] = useState("");
  const [desc, setDesc] = useState("");
  const [open, setOpen] = useState(false);
  const items = (community.tabContent||{})[tab.id] || [];
  const sorted = [...items].sort((a,b)=>(a.date||"")>(b.date||"")?1:-1);
  return html`
    <div style=${{flex:1,overflowY:"auto"}}>
      <div style=${{maxWidth:560,width:"100%",margin:"0 auto",padding:"18px 14px"}}>
        <div style=${{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
          <div style=${{fontSize:15,fontWeight:800,color:"rgba(255,255,255,0.78)"}}>${tab.name}</div>
          ${canManage && html`<button onClick=${()=>setOpen(o=>!o)} style=${S.btnP}>${open?"Fechar":"+ Evento"}</button>`}
        </div>
        ${canManage && open && html`
          <div style=${{background:"rgba(255,255,255,0.025)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:10,padding:"14px",marginBottom:14}}>
            <input value=${title} onChange=${e=>setTitle(e.target.value)} placeholder="Nome do evento" style=${{...S.fIn,marginBottom:8}}/>
            <input value=${date} onChange=${e=>setDate(e.target.value)} type="datetime-local" style=${{...S.fIn,marginBottom:8}}/>
            <textarea value=${desc} onChange=${e=>setDesc(e.target.value)} rows=${3} placeholder="Descrição..." style=${{...S.fIn,resize:"none",marginBottom:8}}/>
            <button onClick=${()=>{if(!title.trim())return;onAdd(tab.id,{id:uid(),authorId:currentUser.id,title:title.trim(),date,desc:desc.trim(),ts:nowTs(),createdAt:Date.now()});setTitle("");setDate("");setDesc("");setOpen(false);}} style=${S.btnP}>Criar Evento</button>
          </div>`}
        ${sorted.length===0 && html`<${Muted} icon="📅" label="Nenhum evento" sub="Adicione eventos para a comunidade"/>`}
        ${sorted.map(item=>{
          const d=item.date?new Date(item.date):null;
          const past=d&&d<new Date();
          return html`
            <div key=${item.id} style=${{background:"rgba(255,255,255,0.022)",border:"1px solid rgba(255,255,255,"+(past?"0.04":"0.08")+")",borderRadius:12,padding:"13px",marginBottom:9,opacity:past?0.6:1,animation:"fadeUp 0.3s ease both"}}>
              <div style=${{display:"flex",alignItems:"flex-start",gap:10}}>
                <div style=${{fontSize:22,flexShrink:0,lineHeight:1}}>${past?"📌":"📅"}</div>
                <div style=${{flex:1}}>
                  <div style=${{fontSize:14,fontWeight:700,color:"rgba(255,255,255,0.8)"}}>${item.title}</div>
                  ${d && html`<div style=${{fontSize:11,color:"rgba(100,180,240,0.8)",marginTop:2}}>${d.toLocaleString("pt-BR",{dateStyle:"medium",timeStyle:"short"})}</div>`}
                  ${item.desc && html`<p style=${{margin:"6px 0 0",fontSize:12,lineHeight:1.6,color:"rgba(255,255,255,0.5)"}}>${item.desc}</p>`}
                </div>

            </div>`;
        })}
      </div>
    </div>`;
}

                    <div style=${{fontSize:11,color:"rgba(255,255,255,0.3)",marginTop:3}}>${(chat.members||chat.memberIds||[]).length} membro${chat.members.length!==1?"s":""} · ${chat.messages.length} mensagen${chat.messages.length!==1?"s":""}</div>

                  <div style=${{display:"flex",flexDirection:"column",gap:5,flexShrink:0,alignItems:"flex-end"}}>
                    ${isMember
                      ? html`<button onClick=${()=>onEnterChat(chat.id)} style=${{...S.btnP,fontSize:11}}>→ Entrar</button>`
                      : isPending
                        ? html`<button disabled style=${{...S.micro,opacity:0.5,cursor:"default"}}>Aguardando</button>`
                        : html`<button onClick=${()=>onJoinChat(chat.id)} style=${{...S.btnP,fontSize:11,background:isOpen?"rgba(255,255,255,0.9)":"rgba(220,170,50,0.85)"}}>${isOpen?"Entrar":"Solicitar"}</button>`
                    }
                    <div style=${{display:"flex",gap:4,flexWrap:"wrap",justifyContent:"flex-end"}}>
                      ${(isCreator||canModerate) && html`<button onClick=${()=>onToggleOpen(chat.id)} style=${{...S.micro,fontSize:9}}>${isOpen?"Fechar":"Abrir"}</button>`}
                      ${(isCreator||canModerate) && html`<button onClick=${()=>setSettingsChatId(s=>s===chat.id?null:chat.id)} style=${{...S.micro,fontSize:9,background:settingsChatId===chat.id?"rgba(255,255,255,0.08)":""}}>Personalizar</button>`}
                      ${(isCreator||canModerate) && html`
                        ${confirmDeleteChatId===chat.id
                          ? html`<div style=${{display:"flex",gap:3}}>
                              <button onClick=${()=>{if(onDeleteGroupChat)onDeleteGroupChat(chat.id);setConfirmDeleteChatId(null);}} style=${{...S.micro,fontSize:9,color:"rgba(210,80,80,0.9)",borderColor:"rgba(200,60,60,0.3)"}}>Confirmar</button>
                              <button onClick=${()=>setConfirmDeleteChatId(null)} style=${{...S.micro,fontSize:9}}>Cancelar</button>
                            </div>`
                          : html`<button onClick=${()=>setConfirmDeleteChatId(chat.id)} style=${{...S.micro,fontSize:9,color:"rgba(200,80,80,0.7)"}}>Excluir chat</button>`}`}
                    </div>
                  </div>
                </div>
              </div>
              ${pendingCount>0 && (isCreator||canManage) && html`
                <div style=${{padding:"9px 14px",background:"rgba(220,170,50,0.04)",borderTop:"1px solid rgba(220,170,50,0.1)"}}>
                  <div style=${{fontSize:9,letterSpacing:"0.1em",textTransform:"uppercase",color:"rgba(220,170,50,0.6)",marginBottom:6}}>Solicitações pendentes</div>
                  ${(chat.pendingMembers||[]).map(uid=>{const u=getUser(uid); return html`
                    <div key=${uid} style=${{display:"flex",alignItems:"center",gap:8,padding:"4px 0"}}>
                      <span style=${{fontSize:12,color:"rgba(255,255,255,0.55)",flex:1}}>${u.name} · ${u.cls}</span>
                      <button onClick=${()=>onApprove(chat.id,uid)} style=${{...S.gmb,fontSize:10,color:"rgba(80,200,110,0.9)",borderColor:"rgba(80,200,110,0.25)"}}>✓ Aprovar</button>
                      <button onClick=${()=>onDeny(chat.id,uid)} style=${{...S.gmb,fontSize:10,color:"rgba(200,80,80,0.8)",borderColor:"rgba(200,80,80,0.2)"}}>✕</button>
                    </div>`;
                  })}
                </div>`}
              ${settingsChatId===chat.id && (isCreator||canManage) && html`
                <div style=${{borderTop:"1px solid rgba(255,255,255,0.06)"}}>
                  <${ChatSettingsPanel} chat=${chat} communityId=${community.id}
                    onUpdate=${s=>{if(onUpdateChatSettings) onUpdateChatSettings(chat.id,s);}}
                    onClose=${()=>setSettingsChatId(null)}/>
                </div>`}
            </div>`;
        })}
      </div>
    </div>`;
}

// Dispatcher: render the right tab content based on tab.type
function TabContentView({tab, community, currentUser, canManage, canModerate, getUser, onLike, onComment, onAdd, onRemove, onUpdate, onVote, onEnterChat, onJoinChat, onApprove, onDeny, onToggleOpen, onCreateChat, canCreate, limitMsg, onUpdateChatSettings, onEditPost, onDeletePost, onDeleteGroupChat, onBanUser}) {
  const isMember = (community.members||community.memberIds||[]).includes(currentUser.id||"");
  if (tab.type === "feed") {
    return html`
      <div style=${{flex:1,overflowY:"auto"}}>
        <div style=${{maxWidth:560,width:"100%",margin:"0 auto",padding:"18px 14px"}}>
          <div style=${{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:14}}>
            <div><div style=${{fontSize:15,fontWeight:800,color:"rgba(255,255,255,0.78)"}}>${tab.name}</div><div style=${{fontSize:11,color:"rgba(255,255,255,0.28)"}}>${community.name}</div></div>
          </div>
          ${(community.posts||[]).map(p=>html`<${PostCard} key=${p.id} post=${p} communityId=${community.id} currentUser=${currentUser} getUser=${getUser} onLike=${onLike} onComment=${onComment} onEditPost=${onEditPost} onDeletePost=${onDeletePost} canModerate=${canManage}/>`)}
          ${(community.posts||[]).length===0&&html`<${Muted} icon="◇" label="Nenhum post" sub="Seja o primeiro a publicar"/>`}
        </div>
      </div>`;
  }
  if (tab.type === "chat") {
    return html`<${TabChatList} community=${community} currentUser=${currentUser} canManage=${canManage} canModerate=${canModerate} getUser=${getUser} onEnterChat=${onEnterChat} onJoinChat=${onJoinChat} onApprove=${onApprove} onDeny=${onDeny} onToggleOpen=${onToggleOpen} onCreateChat=${onCreateChat} canCreate=${canCreate} limitMsg=${limitMsg} onUpdateChatSettings=${onUpdateChatSettings} onDeleteGroupChat=${onDeleteGroupChat} onBanUser=${onBanUser}/>`;
  }
  if (tab.type === "announcements") return html`<${TabAnnouncements} tab=${tab} community=${community} currentUser=${currentUser} canManage=${canManage} onAdd=${onAdd} onRemove=${onRemove}/>`;
  if (tab.type === "wiki") return html`<${TabWiki} tab=${tab} community=${community} currentUser=${currentUser} canManage=${canManage} onUpdate=${onUpdate}/>`;
  if (tab.type === "events") return html`<${TabEvents} tab=${tab} community=${community} currentUser=${currentUser} canManage=${canManage} onAdd=${onAdd} onRemove=${onRemove}/>`;
  if (tab.type === "polls") return html`<${TabPolls} tab=${tab} community=${community} currentUser=${currentUser} canManage=${canManage} onAdd=${onAdd} onRemove=${onRemove} onVote=${onVote}/>`;
  if (tab.type === "media") return html`<${TabMedia} tab=${tab} community=${community} currentUser=${currentUser} canManage=${canManage} canPost=${isMember} onAdd=${onAdd} onRemove=${onRemove}/>`;
  if (tab.type === "links") return html`<${TabLinks} tab=${tab} community=${community} currentUser=${currentUser} canManage=${canManage} canPost=${isMember} onAdd=${onAdd} onRemove=${onRemove}/>`;
  if (tab.type === "custom") return html`<${TabCustom} tab=${tab} community=${community} currentUser=${currentUser} canManage=${canManage} canPost=${isMember} onAdd=${onAdd} onRemove=${onRemove}/>`;
  return html`<${Muted} icon="✦" label="Aba desconhecida"/>`;
}
function ChatContent({chat,communityId,currentUser,getUser,onSend,onEditMsg,onDeleteMsg,onAddReaction,canDeleteMsg,myChar,initiative,sessionLog,sessionNote,onSetNote,turnIndex,onNextTurn,onPrevTurn,onResetTurns,onAddInit,onClearInit,onRemoveInit,isGM,isCommOwner,isCommMod}) {
  const [input,setInput]=useState("");
  const [mode,setMode]=useState("text");
  const [diceOpen,setDiceOpen]=useState(false);
  const [rolling,setRolling]=useState(false);
  const [showInit,setShowInit]=useState(false);
  const [showNotes,setShowNotes]=useState(false);
  const [noteDraft,setNoteDraft]=useState(sessionNote||"");
  const [initName,setInitName]=useState("");
  const [initRoll,setInitRoll]=useState("");
  const [bonus,setBonus]=useState("0");
  const [replyTo,setReplyTo]=useState(null);
  const [activeMsg,setActiveMsg]=useState(null);
  const [editingId,setEditingId]=useState(null);
  const [editText,setEditText]=useState("");
  const [privateRoll,setPrivateRoll]=useState(false);
  const [searchOpen,setSearchOpen]=useState(false);
  const [searchQ,setSearchQ]=useState("");
  const EMOJI_OPT=["👍","❤️","😂","😮","😢","🙏","🔥","✨"];
  const bodyRef=useRef(null);
  const diceRef=useRef(null);
  const isRPG=chat.mode==="rpg";
  const hue=CLASS_HUE[currentUser.cls]||240;
  const activeTurn=initiative&&initiative.length>0?initiative[turnIndex%initiative.length]:null;

  useEffect(()=>{if(bodyRef.current&&!searchQ)bodyRef.current.scrollTop=bodyRef.current.scrollHeight;},[chat.messages.length,searchQ]);
  useEffect(()=>{setNoteDraft(sessionNote||"");},[sessionNote]);
  useEffect(()=>{
    if(!diceOpen)return;
    const h=e=>{if(diceRef.current&&!diceRef.current.contains(e.target))setDiceOpen(false);};
    document.addEventListener("mousedown",h);
    return()=>document.removeEventListener("mousedown",h);
  },[diceOpen]);

  function rollChat(sides,label,bon){
    setRolling(true);setDiceOpen(false);
    const bval=parseInt(bon)||0;let n=0;
    const iv=setInterval(()=>{n++;if(n>12){clearInterval(iv);setRolling(false);
      const base=rollD(sides),result=base+bval;SFX.dice();
      onSend(communityId,chat.id,{id:uid(),authorId:currentUser.id,type:"dice",sides,base,bonus:bval,result,
        label:label||(bval?"d"+sides+(bval>0?"+":"")+bval:"d"+sides),ts:nowTs(),isPrivate:privateRoll});
    }},55);
  }
  function send(){
    if(!input.trim())return;
    onSend(communityId,chat.id,{id:uid(),authorId:currentUser.id,type:isRPG?mode:"text",
      text:input.trim(),ts:nowTs(),replyTo:replyTo||null});
    setInput("");setReplyTo(null);SFX.send();
  }
  function startEdit(m){setEditingId(m.id);setEditText(m.text||"");setActiveMsg(null);}
  function submitEdit(){
    if(editText.trim()&&onEditMsg)onEditMsg(communityId,chat.id,editingId,editText.trim());
    setEditingId(null);setEditText("");
  }

  const allMsgs=chat.messages.filter(m=>!m.isPrivate||(isGM||isCommOwner||m.authorId===currentUser.id));
  const displayMsgs=searchQ.trim()?allMsgs.filter(m=>m.text&&m.text.toLowerCase().includes(searchQ.toLowerCase())):allMsgs;
  function _canDel(m){if(canDeleteMsg) return canDeleteMsg(m); return m.authorId===currentUser.id||isGM||isCommOwner||isCommMod;}
  const MODES=[{id:"text",lbl:"Falar",col:"rgba(255,255,255,0.42)",brd:"rgba(255,255,255,0.08)"},{id:"action",lbl:"Ação",col:"rgba(210,165,60,0.9)",brd:"rgba(210,165,60,0.3)"},{id:"narrator",lbl:"Narrador",col:"rgba(160,100,225,0.9)",brd:"rgba(160,100,225,0.32)"}];
  const mc=MODES.find(m=>m.id===mode)||MODES[0];

  return html`
    <div style=${{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}
      onClick=${()=>{if(activeMsg)setActiveMsg(null);}}>

      ${searchOpen && html`
        <div style=${{flexShrink:0,padding:"8px 10px",borderBottom:"1px solid rgba(255,255,255,0.07)",display:"flex",gap:8,alignItems:"center",background:"rgba(0,0,0,0.2)"}}>
          <input value=${searchQ} onChange=${e=>setSearchQ(e.target.value)} autoFocus placeholder="Buscar mensagens..."
            style=${{...S.fIn,flex:1,padding:"8px 12px",fontSize:13}}/>
          ${searchQ && html`<span style=${{fontSize:11,color:"rgba(255,255,255,0.35)",flexShrink:0}}>${displayMsgs.length} result.</span>`}
          <button onClick=${()=>{setSearchOpen(false);setSearchQ("");}} style=${{background:"none",border:"none",color:"rgba(255,255,255,0.4)",cursor:"pointer",fontSize:18,lineHeight:1}}>×</button>
        </div>`}

      ${isRPG && html`
        <div style=${{flexShrink:0,borderBottom:"1px solid rgba(255,255,255,0.05)"}}>
          <button onClick=${()=>setShowInit(o=>!o)} style=${{width:"100%",padding:"6px 12px",background:"none",border:"none",cursor:"pointer",display:"flex",alignItems:"center",gap:6,fontFamily:"inherit"}}>
            <span style=${{fontSize:9,letterSpacing:"0.12em",textTransform:"uppercase",color:"rgba(255,255,255,0.24)"}}>⚡ Iniciativa</span>
            ${initiative&&initiative.length>0 && html`<span style=${{fontSize:9,background:"rgba(220,170,50,0.18)",color:"rgba(220,170,50,0.85)",borderRadius:10,padding:"1px 6px"}}>${initiative.length}</span>`}
            ${activeTurn && html`<span style=${{fontSize:9,color:"rgba(100,210,100,0.85)",background:"rgba(100,210,100,0.1)",borderRadius:10,padding:"1px 7px",marginLeft:2}}>${activeTurn.name}</span>`}
            <span style=${{marginLeft:"auto",fontSize:10,color:"rgba(255,255,255,0.2)"}}>${showInit?"▲":"▼"}</span>
          </button>
          ${showInit && html`
            <div style=${{padding:"0 10px 10px"}}>
              ${initiative&&initiative.length>0 && html`
                <div style=${{marginBottom:8}}>
                  <div style=${{display:"flex",gap:5,marginBottom:7,alignItems:"center"}}>
                    <button onClick=${onPrevTurn} style=${{...S.gmb,padding:"3px 8px"}}>◀</button>
                    <span style=${{flex:1,fontSize:11,color:"rgba(255,255,255,0.5)",textAlign:"center"}}>${activeTurn?"Vez de "+activeTurn.name:"Sem turno"}</span>
                    <button onClick=${onNextTurn} style=${{...S.gmb,padding:"3px 8px",background:"rgba(100,210,100,0.1)",borderColor:"rgba(100,210,100,0.3)",color:"rgba(100,210,100,0.85)"}}>▶</button>
                  </div>
                  ${initiative.map((entry,i)=>{const isAct=i===(turnIndex%initiative.length); return html`
                    <div key=${entry.id} style=${{display:"flex",alignItems:"center",gap:6,padding:"5px 6px",borderRadius:6,marginBottom:2,background:isAct?"rgba(100,210,100,0.1)":"transparent",border:isAct?"1px solid rgba(100,210,100,0.3)":"1px solid transparent"}}>
                      ${isAct && html`<span style=${{fontSize:10,color:"rgba(100,210,100,0.9)"}}>▶</span>`}
                      <span style=${{fontSize:12,fontWeight:700,color:isAct?"rgba(100,210,100,0.95)":"rgba(255,255,255,0.55)",minWidth:24,textAlign:"right"}}>${entry.roll}</span>
                      <span style=${{flex:1,fontSize:12,color:isAct?"rgba(255,255,255,0.9)":"rgba(255,255,255,0.65)",fontWeight:isAct?700:400}}>${entry.name}</span>
                      <button onClick=${()=>onRemoveInit(entry.id)} style=${{background:"none",border:"none",color:"rgba(255,255,255,0.24)",cursor:"pointer",fontSize:14}}>×</button>
                    </div>`;})}
                  <div style=${{display:"flex",gap:5,marginTop:6}}>
                    <button onClick=${onClearInit} style=${S.micro}>Limpar</button>
                    <button onClick=${onResetTurns} style=${S.micro}>↺ Reset</button>
                  </div>
                </div>`}
              <div style=${{display:"flex",gap:5}}>
                <input value=${initName} onChange=${e=>setInitName(e.target.value)} onKeyDown=${e=>{if(e.key==="Enter"&&initName.trim()){const r=initRoll?parseInt(initRoll):rollD(20)+modN((myChar&&myChar.dex)||10);onAddInit(initName.trim(),r);setInitName("");setInitRoll("");}}} placeholder="Nome" style=${{flex:2,background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.09)",borderRadius:7,padding:"5px 8px",color:"rgba(255,255,255,0.72)",fontSize:11,outline:"none",fontFamily:"inherit"}}/>
                <input value=${initRoll} onChange=${e=>setInitRoll(e.target.value)} placeholder="Roll" type="number" style=${{flex:1,background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.09)",borderRadius:7,padding:"5px 8px",color:"rgba(255,255,255,0.72)",fontSize:11,outline:"none",fontFamily:"inherit",textAlign:"center"}}/>
                <button onClick=${()=>{if(!initName.trim())return;const r=initRoll?parseInt(initRoll):rollD(20)+modN((myChar&&myChar.dex)||10);onAddInit(initName.trim(),r);setInitName("");setInitRoll("");}} style=${S.addBtn}>+</button>
              </div>
            </div>`}
        </div>`}

      ${isRPG && sessionNote && !isGM && html`
        <div style=${{flexShrink:0,padding:"5px 12px 7px",borderBottom:"1px solid rgba(255,255,255,0.05)",background:"rgba(220,170,50,0.04)"}}>
          <div style=${{fontSize:8,letterSpacing:"0.12em",textTransform:"uppercase",color:"rgba(220,170,50,0.55)",marginBottom:4}}>Notas da Sessão</div>
          <div style=${{fontSize:11,color:"rgba(255,255,255,0.55)",lineHeight:1.6}}>${sessionNote}</div>
        </div>`}
      ${isRPG && isGM && html`
        <div style=${{flexShrink:0,borderBottom:"1px solid rgba(255,255,255,0.05)"}}>
          <button onClick=${()=>setShowNotes(o=>!o)} style=${{width:"100%",padding:"5px 12px",background:"none",border:"none",cursor:"pointer",display:"flex",alignItems:"center",gap:6,fontFamily:"inherit"}}>
            <span style=${{fontSize:9,letterSpacing:"0.12em",textTransform:"uppercase",color:"rgba(220,170,50,0.6)"}}>Notas da Sessão</span>
            <span style=${{marginLeft:"auto",fontSize:10,color:"rgba(255,255,255,0.2)"}}>${showNotes?"▲":"▼"}</span>
          </button>
          ${showNotes && html`
            <div style=${{padding:"0 10px 8px"}}>
              <textarea value=${noteDraft} onChange=${e=>setNoteDraft(e.target.value)} placeholder="Notas publicas..." rows=${3} style=${{...S.fIn,resize:"vertical",lineHeight:1.6,fontSize:11}}/>
              <button onClick=${()=>{if(onSetNote)onSetNote(noteDraft);SFX.send();}} style=${{...S.micro,marginTop:5,fontSize:10}}>Salvar notas</button>
            </div>`}
        </div>`}

      ${sessionLog&&sessionLog.length>0&&isRPG && html`
        <details style=${{flexShrink:0,borderBottom:"1px solid rgba(255,255,255,0.05)"}}>
          <summary style=${{padding:"5px 12px",fontSize:9,letterSpacing:"0.12em",textTransform:"uppercase",color:"rgba(255,255,255,0.24)",cursor:"pointer",display:"flex",alignItems:"center",gap:6}}>
            📋 Log (${sessionLog.length})
          </summary>
          <div style=${{maxHeight:90,overflowY:"auto",padding:"4px 12px 8px"}}>
            ${sessionLog.map(e=>html`
              <div key=${e.id} style=${{display:"flex",gap:8,padding:"3px 0",borderBottom:"1px solid rgba(255,255,255,0.04)"}}>
                <span style=${{fontSize:9,color:"rgba(255,255,255,0.22)",flexShrink:0}}>${e.ts}</span>
                <span style=${{fontSize:11,color:"rgba(255,255,255,0.46)"}}>${e.summary}</span>
              </div>`)}
          </div>
        </details>`}

      <div ref=${bodyRef} style=${{flex:1,overflowY:"auto",padding:"10px 8px",display:"flex",flexDirection:"column",gap:6,background:chat.bgUrl?("url("+chat.bgUrl+") center/cover"):chat.bgColor||"transparent"}}>
        ${displayMsgs.length===0 && html`<${Muted} icon=${isRPG?"⚔":"◉"} label=${searchQ?"Nenhum resultado":"Nenhuma mensagem"} sub=${searchQ?"Tente outra busca":isRPG?"A sessão ainda não começou":"Seja o primeiro a falar"}/>`}
        ${displayMsgs.map((m,i)=>{
          const author=getUser(m.authorId),isOwn=m.authorId===currentUser.id,mh=CLASS_HUE[author.cls]||240;
          const canDel=_canDel(m), isActive=activeMsg===m.id;
          if(m.type==="dice"){
            const isCrit=m.result===m.sides,isFail=m.base===1;
            return html`
              <div key=${m.id||i} style=${{display:"flex",flexDirection:"column",alignItems:"center",animation:"fadeUp 0.28s ease both",gap:4}}>
                <div onClick=${e=>{e.stopPropagation();setActiveMsg(isActive?null:m.id);}}
                  style=${{display:"inline-flex",alignItems:"center",gap:8,background:m.isPrivate?"rgba(220,170,50,0.06)":"rgba(255,255,255,0.03)",border:"1px solid "+(m.isPrivate?"rgba(220,170,50,0.3)":isCrit?"rgba(220,180,50,0.35)":isFail?"rgba(200,60,60,0.35)":"rgba(255,255,255,0.07)"),borderRadius:10,padding:"8px 14px",flexWrap:"wrap",justifyContent:"center",cursor:"pointer"}}>
                  ${m.isPrivate && html`<span style=${{fontSize:9,color:"rgba(220,170,50,0.7)"}}>🔒 Privada</span>`}
                  <span style=${{fontSize:10,color:hsl(mh,50,55),fontWeight:700}}>${author.name}</span>
                  <span style=${{fontSize:9,color:"rgba(255,255,255,0.26)"}}>rolou ${m.label}</span>
                  <span style=${{fontSize:22,fontWeight:900,color:isCrit?"rgba(255,210,50,0.95)":isFail?"rgba(215,65,55,0.9)":"rgba(255,255,255,0.88)"}}>${m.result}</span>
                  ${m.bonus!==0&&m.bonus!=null && html`<span style=${{fontSize:9,color:"rgba(255,255,255,0.3)"}}>(${m.base}${m.bonus>0?"+":""}${m.bonus})</span>`}
                  ${isCrit && html`<span style=${{fontSize:8,color:"rgba(220,175,45,0.85)"}}>CRÍTICO!</span>`}
                  ${isFail&&!isCrit && html`<span style=${{fontSize:8,color:"rgba(200,55,55,0.85)"}}>FALHA!</span>`}
                  <span style=${{fontSize:8,color:"rgba(255,255,255,0.16)"}}>${m.ts}</span>
                </div>
                ${isActive && canDel && html`
                  <div style=${{display:"flex",gap:4,animation:"fadeUp 0.15s ease both"}}>
                    <button onClick=${e=>{e.stopPropagation();if(onDeleteMsg)onDeleteMsg(communityId,chat.id,m.id);setActiveMsg(null);}} style=${{...S.gmb,fontSize:10,color:"rgba(200,80,80,0.8)"}}>Apagar</button>
                  </div>`}
              </div>`;
          }
          if(m.type==="narrator") return html`
            <div key=${m.id||i} style=${{display:"flex",flexDirection:"column",alignItems:"center",animation:"fadeUp 0.28s ease both",gap:4,margin:"2px 0"}}>
              <div onClick=${e=>{e.stopPropagation();setActiveMsg(isActive?null:m.id);}} style=${{maxWidth:"90%",background:"linear-gradient(135deg,rgba(70,25,130,0.22),rgba(35,12,70,0.28))",border:"1px solid rgba(150,95,215,0.2)",borderRadius:9,padding:"10px 14px",textAlign:"center",cursor:"pointer"}}>
                <div style=${{fontSize:8,letterSpacing:"0.16em",textTransform:"uppercase",color:"rgba(155,100,220,0.65)",marginBottom:5}}>✦ Narrador</div>
                <p style=${{margin:0,fontSize:13,fontStyle:"italic",lineHeight:1.75,color:"rgba(195,165,235,0.88)"}}>${m.text}</p>
                <span style=${{fontSize:8,color:"rgba(255,255,255,0.16)",marginTop:5,display:"block"}}>${m.ts}${m.edited?" · editado":""}</span>
              </div>
              ${isActive && html`
                <div style=${{display:"flex",gap:4,animation:"fadeUp 0.15s ease both"}}>
                  <button onClick=${e=>{e.stopPropagation();setReplyTo({id:m.id,authorName:author.name,text:m.text||""});setActiveMsg(null);}} style=${{...S.gmb,fontSize:11}}>↩</button>
                  ${EMOJI_OPT.slice(0,4).map(em=>html`<button key=${em} onClick=${e=>{e.stopPropagation();if(onAddReaction)onAddReaction(communityId,chat.id,m.id,em);setActiveMsg(null);}} style=${{...S.gmb,fontSize:13}}>${em}</button>`)}

      <div style=${{padding:"8px 9px 10px",borderTop:"1px solid rgba(255,255,255,0.06)",background:"rgba(0,0,0,0.15)",flexShrink:0}}>

              ${isGM && html`<button onClick=${()=>setPrivateRoll(o=>!o)} title="Rolagem privada (só GM vê)" style=${{...S.gmb,padding:"4px 8px",fontSize:11,background:privateRoll?"rgba(220,170,50,0.12)":"",color:privateRoll?"rgba(220,170,50,0.9)":"rgba(255,255,255,0.35)"}}>priv.</button>`}
            </div>
          </div>`}
        ${!isRPG && html`
          <div style=${{display:"flex",justifyContent:"flex-end",marginBottom:5}}>
            <button onClick=${()=>{setSearchOpen(o=>!o);if(searchOpen)setSearchQ("");}} style=${{...S.gmb,padding:"4px 9px",fontSize:11,background:searchOpen?"rgba(100,180,240,0.1)":"",color:searchOpen?"rgba(100,180,240,0.8)":"rgba(255,255,255,0.35)"}}>⌕</button>
          </div>`}
        <div style=${{display:"flex",gap:5,alignItems:"center",position:"relative"}}>
          ${isRPG && html`
            <div ref=${diceRef} style=${{position:"relative",flexShrink:0}}>
              <button onClick=${()=>setDiceOpen(o=>!o)} style=${{width:36,height:36,background:diceOpen?"rgba(255,255,255,0.09)":"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.09)",borderRadius:9,color:privateRoll?"rgba(220,170,50,0.7)":"rgba(255,255,255,0.4)",cursor:"pointer",fontSize:14,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"monospace",animation:rolling?"diceRoll 0.45s linear infinite":"none"}}>◬</button>
              ${diceOpen && html`
                <div style=${{position:"absolute",bottom:"calc(100% + 8px)",left:0,background:"#0a0a0d",border:"1px solid rgba(255,255,255,0.12)",borderRadius:14,padding:"14px",zIndex:999,animation:"fadeUp 0.18s ease both",width:260,boxShadow:"0 8px 40px rgba(0,0,0,0.8)"}}>
                  <div style=${{display:"flex",alignItems:"center",gap:6,marginBottom:10}}>
                    <div style=${{fontSize:8,letterSpacing:"0.14em",textTransform:"uppercase",color:"rgba(255,255,255,0.26)",flex:1}}>Rolar dado ${privateRoll?"(privada)":""}</div>
                    <div style=${{display:"flex",alignItems:"center",gap:4}}>
                      <span style=${{fontSize:10,color:"rgba(255,255,255,0.3)"}}>Bônus:</span>
                      <input value=${bonus} onChange=${e=>setBonus(e.target.value)} type="number" style=${{...S.fIn,width:50,padding:"3px 6px",fontSize:12,textAlign:"center"}}/>

                  </div>

                  ${myChar && html`
                    <div style=${{height:1,background:"rgba(255,255,255,0.07)",marginBottom:8}}/>

                          <div style=${{fontSize:10,fontWeight:700,color:"rgba(255,255,255,0.55)"}}>${a.s}</div>

// ── SHEET CONTENT ─────────────────────────────────────────────────────────────
function SheetContent({char,hue,onUpdate,notify}) {
  const [inv, setInv] = useState("");
  const [condOpen, setCondOpen] = useState(false);
  const [expandedSkill, setExpandedSkill] = useState(null);
  if(!char) return html`<${Muted} icon="◎" label="Ficha nao encontrada"/>`;
  const hpPct = Math.max(0,(char.hp/char.mhp)*100);
  const hpC = hpPct>50?"rgba(80,200,110,0.9)":hpPct>25?"rgba(230,170,50,0.9)":"rgba(220,70,60,0.9)";
  const aL = hsl(hue,60,62);
  const conditions = char.conditions||[];
  const abilities = char.spells||[];

  function addAbility() {
    const n = abilities.length+1;
    const entry = {id:"ab_"+uid(), name:"Habilidade "+n, desc:""};
    onUpdate("spells",[...abilities, entry]);
    setExpandedSkill(entry.id);
  }
  function updAbility(id, key, val) {
    onUpdate("spells", abilities.map(a=>a.id===id?{...a,[key]:val}:a));
  }
  function removeAbility(id) {
    onUpdate("spells", abilities.filter(a=>a.id!==id));
    if(expandedSkill===id) setExpandedSkill(null);
  }

  function exportSheet() {
    const lines=["=== FICHA REALM FORGE ===",char.name+" | "+char.race+" "+char.cls+" | Nivel "+char.lvl,"HP: "+char.hp+"/"+char.mhp+" CA: "+char.ac+" Gold: "+char.gold+" XP: "+(char.xp||0),"---","ATRIBUTOS:",...ATTRS.map(a=>a.l+": "+(char[a.k]||10)+" ("+modStr(char[a.k]||10)+")"),"---","HABILIDADES:",...abilities.map(ab=>"- "+ab.name+(ab.desc?"\n  "+ab.desc:"")),"---","INVENTARIO:",...(char.inv||[]).map(it=>"- "+it),"---","ANOTACOES:",char.notes||"(vazio)"];
    const blob=new Blob([lines.join("\n")],{type:"text/plain"});
    const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download=(char.name||"personagem").replace(/\s+/g,"_")+"_ficha.txt"; a.click();
  }

  const [editMeta, setEditMeta] = useState(false);
  const [metaName, setMetaName] = useState(char.name||"");
  const [metaCls, setMetaCls] = useState(char.cls||"Guerreiro");
  const [metaRace, setMetaRace] = useState(char.race||"Humano");

  return html`
    <div style=${{flex:1,overflowY:"auto",padding:"14px 16px"}}>
      <div style=${{background:"linear-gradient(135deg,"+hsl(hue,28,8)+",rgba(0,0,0,0))",border:"1px solid "+hsl(hue,33,18),borderRadius:12,padding:"12px 14px",marginBottom:10,display:"flex",gap:12,alignItems:"center"}}>
        <div style=${{fontSize:30,color:aL,flexShrink:0}}>${CSYM[char.cls]||"✦"}</div>
        <div style=${{flex:1,minWidth:0}}>
          ${editMeta
            ? html`
              <input value=${metaName} onChange=${e=>setMetaName(e.target.value)} style=${{...S.fIn,fontSize:15,fontWeight:800,padding:"4px 8px",marginBottom:6}} placeholder="Nome"/>
              <div style=${{display:"flex",gap:6}}>
                <select value=${metaCls} onChange=${e=>setMetaCls(e.target.value)} style=${{...S.fSel,fontSize:11,padding:"4px 8px",flex:1}}>
                  ${CLASSES.map(c=>html`<option key=${c} value=${c}>${c}</option>`)}
                </select>
                <select value=${metaRace} onChange=${e=>setMetaRace(e.target.value)} style=${{...S.fSel,fontSize:11,padding:"4px 8px",flex:1}}>
                  ${RACES.map(r=>html`<option key=${r} value=${r}>${r}</option>`)}
                </select>
              </div>
              <div style=${{display:"flex",gap:5,marginTop:6}}>
                <button onClick=${()=>{if(metaName.trim()&&onUpdate){onUpdate("name",metaName.trim());onUpdate("cls",metaCls);onUpdate("race",metaRace);}setEditMeta(false);if(notify)notify("Personagem atualizado!");}} style=${{...S.micro,fontSize:10,flex:1,textAlign:"center",color:"rgba(80,200,110,0.9)"}}>✓ Salvar</button>
                <button onClick=${()=>setEditMeta(false)} style=${{...S.micro,fontSize:10}}>Cancelar</button>
              </div>`
            : html`
              <div style=${{display:"flex",alignItems:"center",gap:6}}>
                <div style=${{fontSize:16,fontWeight:800,color:"rgba(255,255,255,0.9)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",flex:1}}>${char.name}</div>
                <button onClick=${()=>{setMetaName(char.name||"");setMetaCls(char.cls||"Guerreiro");setMetaRace(char.race||"Humano");setEditMeta(true);}} style=${{background:"none",border:"none",color:"rgba(255,255,255,0.25)",cursor:"pointer",fontSize:14,lineHeight:1,flexShrink:0}} title="Editar personagem">✏</button>
              </div>
              <div style=${{fontSize:10,color:"rgba(255,255,255,0.32)",marginTop:2,textTransform:"uppercase",letterSpacing:"0.08em"}}>${char.race} · ${char.cls} · Nv.${char.lvl||1}</div>`}
        </div>
        <div style=${{display:"flex",gap:5,flexShrink:0}}>
          ${[["HP",char.hp+"/"+char.mhp,hpC],["CA",char.ac,"rgba(100,160,240,0.9)"],["PO",char.gold,"rgba(210,170,50,0.9)"]].map(([l,v,c])=>html`
            <div key=${l} style=${{background:"rgba(0,0,0,0.4)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:7,padding:"5px 7px",textAlign:"center",minWidth:36}}>
              <div style=${{fontSize:8,color:"rgba(255,255,255,0.24)",textTransform:"uppercase"}}>${l}</div>
              <div style=${{fontSize:13,fontWeight:800,color:c,marginTop:1}}>${v}</div>
            </div>`)}
        </div>
      </div>

      <div style=${{height:3,background:"rgba(255,255,255,0.05)",borderRadius:2,marginBottom:8,overflow:"hidden"}}><div style=${{height:"100%",width:hpPct+"%",background:hpC,transition:"width 0.4s",borderRadius:2}}/></div>

      <div style=${{display:"flex",gap:5,marginBottom:12,flexWrap:"wrap"}}>
        ${[["HP−",()=>onUpdate("hp",Math.max(0,char.hp-1))],["+HP",()=>onUpdate("hp",Math.min(char.mhp,char.hp+1))],["Rest",()=>onUpdate("hp",char.mhp)],["CA−",()=>onUpdate("ac",Math.max(0,char.ac-1))],["CA+",()=>onUpdate("ac",char.ac+1)],["PO−",()=>onUpdate("gold",Math.max(0,char.gold-1))],["PO+",()=>onUpdate("gold",char.gold+1)]].map(([l,fn])=>html`<button key=${l} style=${S.micro} onClick=${fn}>${l}</button>`)}
        <button style=${{...S.micro,marginLeft:"auto"}} onClick=${exportSheet}>↓ Exportar</button>
      </div>

      <${ShSec}>Experiência<//>
      <div style=${{marginBottom:12}}>
        <div style=${{display:"flex",justifyContent:"space-between",marginBottom:4}}>
          <span style=${{fontSize:11,color:"rgba(255,255,255,0.38)"}}>Nível ${char.lvl||1} · ${char.xp||0} XP</span>
          <span style=${{fontSize:11,color:"rgba(255,255,255,0.22)"}}>${(char.lvl||1)<20?"próx: "+(XP_LVL[(char.lvl||1)+1]||0)+" XP":"Máximo!"}</span>
        </div>
        <div style=${{height:3,background:"rgba(255,255,255,0.06)",borderRadius:2,overflow:"hidden"}}><div style=${{height:"100%",borderRadius:2,background:aL,transition:"width 0.5s",width:xpPct(char.xp||0,char.lvl||1)+"%"}}/></div>
      </div>

      ${CASTERS.includes(char.cls)&&(char.spellSlots||[]).some(s=>s.max>0) && html`
        <div style=${{marginBottom:12}}>
          <${ShSec}>Espaços de Magia<//>
          <div style=${{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:5,marginBottom:7}}>
            ${(char.spellSlots||[]).map((s,i)=>s.max>0 && html`
              <div key=${i} style=${{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:8,padding:"6px 4px",textAlign:"center"}}>
                <div style=${{fontSize:8,color:"rgba(255,255,255,0.28)",marginBottom:4}}>Nv.${i+1}</div>
                <div style=${{display:"flex",gap:3,justifyContent:"center",flexWrap:"wrap"}}>
                  ${Array.from({length:s.max}).map((_,j)=>html`
                    <div key=${j} onClick=${()=>{const ns=(char.spellSlots||[]).slice();ns[i]={max:s.max,used:j<s.used?j:Math.min(s.max,s.used+1)};onUpdate("spellSlots",ns);}}
                      style=${{width:12,height:12,borderRadius:"50%",cursor:"pointer",background:j<(s.used||0)?hsl(hue,55,35):"transparent",border:"1px solid "+(j<(s.used||0)?hsl(hue,45,45):"rgba(255,255,255,0.22)"),transition:"all 0.15s"}}/>`)}
                </div>
                <div style=${{fontSize:9,color:"rgba(255,255,255,0.32)",marginTop:3}}>${s.max-(s.used||0)}/${s.max}</div>
              </div>`)}
          </div>
          <button style=${{...S.micro,fontSize:10}} onClick=${()=>onUpdate("spellSlots",(char.spellSlots||[]).map(s=>({max:s.max,used:0})))}>🌙 Descanso Longo</button>
        </div>`}

      <div style=${{marginBottom:12}}>
        <div style=${{display:"flex",alignItems:"center",marginBottom:7}}>
          <div style=${{fontSize:8,letterSpacing:"0.14em",textTransform:"uppercase",color:"rgba(255,255,255,0.26)",flex:1}}>Magias & Habilidades</div>
          <button onClick=${addAbility} style=${{...S.micro,fontSize:11,padding:"3px 10px"}}>+ Nova</button>
        </div>
        ${abilities.length===0 && html`
          <div style=${{textAlign:"center",padding:"16px",border:"1px dashed rgba(255,255,255,0.08)",borderRadius:10,color:"rgba(255,255,255,0.24)",fontSize:12}}>
            Nenhuma habilidade. Clique + Nova para adicionar.
          </div>`}
        ${abilities.map((ab,idx)=>{
          const isOpen = expandedSkill===ab.id;
          return html`

// ── DICE CONTENT ──────────────────────────────────────────────────────────────
function DiceContent({hue=240}) {
  const [result, setResult] = useState(null);
  const [spin, setSpin] = useState(false);
  const [hist, setHist] = useState([]);
  const [bonus, setBonus] = useState("0");
  const [cn, setCN] = useState("1");
  const [cd, setCD] = useState("6");

  function spinDice(sides,lbl,bon) {
    setSpin(true); setResult(null);
    const bval=parseInt(bon)||0; let n=0;
    const iv=setInterval(()=>{ setResult(rollD(sides)); n++; if(n>14){ clearInterval(iv); const base=rollD(sides),total=base+bval; setResult(total); setSpin(false); SFX.dice(); const label=lbl||(bval?"d"+sides+(bval>0?"+":"")+bval:"d"+sides); setHist(h=>[{l:label,r:total,t:nowTs()},...h].slice(0,24)); } },55);
  }
  function rollCustom() {
    const nv=Math.max(1,Math.min(20,parseInt(cn)||1)),dv=Math.max(2,Math.min(100,parseInt(cd)||6)),bval=parseInt(bonus)||0;
    setSpin(true); setResult(null); let cnt=0;
    const iv=setInterval(()=>{ setResult(rollD(dv)); cnt++; if(cnt>14){ clearInterval(iv); let total=0; for(let i=0;i<nv;i++) total+=rollD(dv); total+=bval; setResult(total); setSpin(false); SFX.dice(); const lbl=nv+"d"+dv+(bval?bval>0?"+"+bval:bval:""); setHist(h=>[{l:lbl,r:total,t:nowTs()},...h].slice(0,24)); } },55);
  }
  return html`
    <div style=${{flex:1,overflowY:"auto",padding:"13px 11px",display:"flex",flexDirection:"column",alignItems:"center",gap:14}}>
      <div style=${{width:100,height:100,borderRadius:18,background:"rgba(255,255,255,0.025)",border:"1px solid rgba(255,255,255,0.08)",display:"flex",alignItems:"center",justifyContent:"center",animation:spin?"diceRoll 0.45s linear infinite":"none",flexShrink:0}}>
        ${result!=null ? html`<div style=${{fontSize:42,fontWeight:900,color:"rgba(255,255,255,0.9)",lineHeight:1}}>${result}</div>` : html`<div style=${{fontSize:18,color:"rgba(255,255,255,0.12)"}}>◬</div>`}
      </div>
      <div style=${{display:"flex",alignItems:"center",gap:6,width:"100%"}}>
        <span style=${{fontSize:11,color:"rgba(255,255,255,0.34)"}}>Bônus</span>
        <input value=${bonus} onChange=${e=>setBonus(e.target.value)} type="number" style=${{...S.fIn,width:60,padding:"5px 8px",textAlign:"center"}}/>
      </div>
      <div style=${{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:5,width:"100%"}}>
        ${DICE.map(s=>html`<button key=${s} onClick=${()=>spinDice(s,null,bonus)} style=${{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.09)",borderRadius:8,color:"rgba(255,255,255,0.44)",padding:"8px 3px",cursor:"pointer",fontWeight:700,textAlign:"center",fontFamily:"inherit",fontSize:12}}>d${s}</button>`)}
      </div>
      <div style=${{width:"100%",background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:10,padding:"10px"}}>
        <div style=${{fontSize:8,letterSpacing:"0.14em",textTransform:"uppercase",color:"rgba(255,255,255,0.26)",marginBottom:8}}>Rolagem personalizada</div>
        <div style=${{display:"flex",alignItems:"center",gap:6}}>
          <input value=${cn} onChange=${e=>setCN(e.target.value)} type="number" min="1" max="20" style=${{...S.fIn,width:44,padding:"5px",textAlign:"center"}}/>
          <span style=${{color:"rgba(255,255,255,0.4)"}}>d</span>
          <input value=${cd} onChange=${e=>setCD(e.target.value)} type="number" min="2" max="100" style=${{...S.fIn,width:52,padding:"5px",textAlign:"center"}}/>
          <span style=${{color:"rgba(255,255,255,0.4)"}}>+</span>
          <input value=${bonus} onChange=${e=>setBonus(e.target.value)} type="number" style=${{...S.fIn,width:44,padding:"5px",textAlign:"center"}}/>
          <button onClick=${rollCustom} style=${{...S.btnP,padding:"6px 12px",fontSize:11,marginLeft:"auto"}}>Rolar</button>
        </div>
      </div>
      ${hist.length>0 && html`
        <div style=${{width:"100%",background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:10,padding:"9px"}}>
          <div style=${{fontSize:8,letterSpacing:"0.14em",textTransform:"uppercase",color:"rgba(255,255,255,0.24)",marginBottom:7}}>Histórico</div>
          ${hist.slice(0,10).map((h,i)=>html`
            <div key=${i} style=${{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"4px 4px",background:i===0?"rgba(255,255,255,0.04)":"transparent",borderRadius:4}}>
              <span style=${{fontSize:10,color:"rgba(255,255,255,0.3)",fontFamily:"monospace"}}>${h.l}</span>
              <span style=${{fontSize:17,fontWeight:800,color:"rgba(255,255,255,0.78)"}}>${h.r}</span>
              <span style=${{fontSize:8,color:"rgba(255,255,255,0.22)"}}>${h.t}</span>
            </div>`)}
        </div>`}
    </div>`;
}

              </div>`)}
            <div style=${{display:"flex",gap:4,marginTop:5}}>
