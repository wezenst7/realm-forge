// htm - minimal tagged template literal JSX parser (no external deps)
var htm = (function() {

function build(statics, fields, h_fn) {
  var str = '';
  for (var i = 0; i < statics.length; i++) {
    str += statics[i];
    if (i + 1 < statics.length) str += '\x01' + i + '\x01';
  }
  var pos = 0;
  var root_nodes = [];

  function parseChildren(parent_children) {
    while (pos < str.length) {
      while (pos < str.length && str[pos] <= ' ' && str[pos] !== '\x01') pos++;
      if (pos >= str.length) break;
      if (str[pos] === '<' && str[pos+1] === '/') {
        pos = str.indexOf('>', pos);
        if (pos === -1) pos = str.length; else pos++;
        return;
      }
      if (str[pos] === '<') {
        pos++;
        var isSelfClose = false;
        var tag_start = pos;
        while (pos < str.length && str[pos] !== ' ' && str[pos] !== '\t' && str[pos] !== '\n' && str[pos] !== '>' && str[pos] !== '/' && str[pos] !== '\x01') pos++;
        var tag = str.slice(tag_start, pos).trim();
        if (tag.indexOf('\x01') !== -1) {
          var m = tag.match(/\x01(\d+)\x01/);
          if (m) tag = fields[+m[1]];
        }
        // Handle case where entire tag name is a placeholder: <${MyComp}
        if (!tag && pos < str.length && str[pos] === '\x01') {
          pos++;
          var tag_idx = '';
          while (pos < str.length && str[pos] !== '\x01') tag_idx += str[pos++];
          pos++;
          tag = fields[+tag_idx];
        }
        var props = {};
        var children = [];
        while (pos < str.length) {
          while (pos < str.length && (str[pos] === ' ' || str[pos] === '\t' || str[pos] === '\n' || str[pos] === '\r') && str[pos] !== '\x01') pos++;
          if (pos >= str.length) break;
          var c = str[pos];
          if (c === '>') { pos++; break; }
          if (c === '/' && str[pos+1] === '>') { pos+=2; isSelfClose=true; break; }
          if (c === '.' && str[pos+1] === '.' && str[pos+2] === '.') {
            pos += 3;
            if (str[pos] === '\x01') {
              pos++;
              var idx = '';
              while (pos < str.length && str[pos] !== '\x01') idx += str[pos++];
              pos++;
              var spread = fields[+idx];
              if (spread && typeof spread === 'object') { for (var k in spread) props[k] = spread[k]; }
            }
            continue;
          }
          var attr_start = pos;
          while (pos < str.length && str[pos] !== '=' && str[pos] !== ' ' && str[pos] !== '\t' && str[pos] !== '\n' && str[pos] !== '>' && str[pos] !== '/' && str[pos] !== '\x01') pos++;
          var attr_name = str.slice(attr_start, pos).trim();
          if (!attr_name) { pos++; continue; }
          if (pos < str.length && str[pos] === '=') {
            pos++;
            var attr_val;
            if (str[pos] === '\x01') {
              pos++;
              var idx = '';
              while (pos < str.length && str[pos] !== '\x01') idx += str[pos++];
              pos++;
              attr_val = fields[+idx];
            } else if (str[pos] === '"' || str[pos] === "'") {
              var q = str[pos++], v_start = pos, v_parts = [];
              while (pos < str.length && str[pos] !== q) {
                if (str[pos] === '\x01') {
                  if (pos > v_start) v_parts.push(str.slice(v_start, pos));
                  pos++;
                  var idx = '';
                  while (pos < str.length && str[pos] !== '\x01') idx += str[pos++];
                  pos++;
                  v_parts.push(fields[+idx]);
                  v_start = pos;
                } else pos++;
              }
              if (pos > v_start) v_parts.push(str.slice(v_start, pos));
              pos++;
              attr_val = v_parts.length === 1 ? v_parts[0] : v_parts.join('');
            } else {
              var v_start = pos;
              while (pos < str.length && str[pos] !== ' ' && str[pos] !== '>' && str[pos] !== '\n') pos++;
              attr_val = str.slice(v_start, pos);
            }
            props[attr_name] = attr_val;
          } else if (str[pos] === '\x01') {
            pos++;
            var idx = '';
            while (pos < str.length && str[pos] !== '\x01') idx += str[pos++];
            pos++;
            props[attr_name] = fields[+idx];
          } else {
            props[attr_name] = true;
          }
        }
        if (isSelfClose) {
          parent_children.push(h_fn(tag, props));
        } else {
          parseChildren(children);
          var final_props = props;
          if (children.length === 1) final_props.children = children[0];
          else if (children.length > 1) final_props.children = children;
          parent_children.push(h_fn(tag, final_props));
        }
      } else {
        var parts = [], t_start = pos;
        while (pos < str.length && str[pos] !== '<') {
          if (str[pos] === '\x01') {
            if (pos > t_start) { var t = str.slice(t_start, pos).trim(); if (t) parts.push(t); }
            pos++;
            var idx = '';
            while (pos < str.length && str[pos] !== '\x01') idx += str[pos++];
            pos++;
            var v = fields[+idx];
            if (v !== null && v !== undefined && v !== false && v !== '') parts.push(v);
            t_start = pos;
          } else pos++;
        }
        if (pos > t_start) { var t = str.slice(t_start, pos).trim(); if (t) parts.push(t); }
        for (var pi = 0; pi < parts.length; pi++) parent_children.push(parts[pi]);
      }
    }
  }

  parseChildren(root_nodes);
  return root_nodes.length === 1 ? root_nodes[0] : root_nodes.length > 1 ? root_nodes : null;
}

return {
  bind: function(h_fn) {
    return function(statics) {
      var fields = Array.prototype.slice.call(arguments, 1);
      return build(statics, fields, h_fn);
    };
  }
};

})();

// Migrate communities to new tab + fullscreen-chat structure
function migrateComm(c) {
  const gcs = (c.groupChats||[]).map(g=>({...g, isOpen:g.isOpen!==false, pendingMembers:g.pendingMembers||[]}));
  // If already migrated (no per-chat tabs with chatId links)
  if (c.tabs && !c.tabs.some(t=>t.chatId)) {
    return {...c, groupChats:gcs, moderators:c.moderators||[], tabContent:c.tabContent||{}};
  }
  // Build fresh tabs: strip old per-chat tabs, keep others
  let tabs = c.tabs ? c.tabs.filter(t=>!t.chatId) : [{id:"t_feed_"+c.id, name:"Posts", type:"feed", icon:"◇", order:0}];
  if (gcs.length > 0 && !tabs.find(t=>t.type==="chat")) {
    tabs.push({id:"t_chats_"+c.id, name:"Chats", type:"chat", icon:"⬡", order:999});
  }
  return {...c, groupChats:gcs, tabs, moderators:c.moderators||[], tabContent:c.tabContent||{}};
}

function modN(v) { return Math.floor(((v||10)-10)/2); }
function modStr(v) { const m = modN(v); return m >= 0 ? "+" + m : "" + m; }
function rollD(n) { return Math.floor(Math.random()*n)+1; }
function nowTs() { return new Date().toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"}); }
function uid() { return Math.random().toString(36).slice(2,10); }
function initials(n) { return (n||"?").trim().split(" ").filter(Boolean).map(w=>w[0]).join("").toUpperCase().slice(0,2)||"?"; }
function hsl(h,s,l,a) { return a!=null ? "hsla("+h+","+s+"%,"+l+"%,"+a+")" : "hsl("+h+","+s+"%,"+l+"%)"; }
function isMobile() { return window.innerWidth <= 768; }
function xpPct(xp,lvl) { if(lvl>=20) return 100; const base=XP_LVL[lvl]||0, next=XP_LVL[lvl+1]||1; return Math.min(100,Math.max(0,((xp-base)/(next-base))*100)); }
function initSlots(cls,lvl) { if(!CASTERS.includes(cls)) return []; return (SPELL_SLOTS[lvl]||[]).map(n=>({max:n,used:0})); }
function compressPhoto(file, cb, size=80) {
  const img = new Image(), url = URL.createObjectURL(file);
  img.onload = () => {
    const c = document.createElement("canvas"); c.width = c.height = size;
    const ctx = c.getContext("2d"), min = Math.min(img.width,img.height);
    ctx.drawImage(img,(img.width-min)/2,(img.height-min)/2,min,min,0,0,size,size);
    cb(c.toDataURL("image/jpeg",0.78)); URL.revokeObjectURL(url);
  };
  img.onerror = ()=>URL.revokeObjectURL(url);
  img.src = url;
}

const SFX = (function() {
  let ctx = null, on = true;
  function gc() { if(!ctx) try { ctx = new (window.AudioContext||window.webkitAudioContext)(); } catch(e) {} return ctx; }
  function tone(f,d,v,type) { const c=gc(); if(!c||!on) return; const g=c.createGain(), o=c.createOscillator(); g.gain.setValueAtTime(v||0.15,c.currentTime); g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+d); o.connect(g); g.connect(c.destination); o.type=type||"sine"; o.frequency.value=f; o.start(); o.stop(c.currentTime+d); }
  return {
    dice: () => { tone(220,0.06,0.12,"square"); setTimeout(()=>tone(440,0.08,0.1),60); setTimeout(()=>tone(660,0.1,0.12),130); },
    send: () => { tone(880,0.04,0.06); setTimeout(()=>tone(1100,0.05,0.05),40); },
    lvlup: () => { [262,330,392,523,659,784].forEach((f,i)=>setTimeout(()=>tone(f,0.18,0.15),i*80)); },
    notify: () => { tone(1000,0.06,0.08); setTimeout(()=>tone(1200,0.08,0.07),70); },
    toggle: (v) => { on = v; }
  };
})();

// ── FLOAT WINDOW ──────────────────────────────────────────────────────────────
function FloatWindow({title,icon,color,children,initPos,initSize,minW=260,minH=180,zIdx,onFocus,onClose,onMin,minimized,hdrExtra}) {
  const posRef  = useRef(initPos||{x:80,y:50});
  const sizeRef = useRef(initSize||{w:420,h:480});
  const dragging = useRef(false), resizing = useRef(false);
  const dOrig = useRef({}), rOrig = useRef({});
  const winRef = useRef(null);

  function startDrag(e) {
    if (e.target.closest("[data-nd]")) return;
    e.preventDefault(); if(onFocus) onFocus(); dragging.current = true;
    dOrig.current = {mx:e.clientX,my:e.clientY,wx:posRef.current.x,wy:posRef.current.y};
    const mv = ev => { if(!dragging.current) return; const nx=Math.max(0,dOrig.current.wx+(ev.clientX-dOrig.current.mx)), ny=Math.max(0,dOrig.current.wy+(ev.clientY-dOrig.current.my)); posRef.current={x:nx,y:ny}; if(winRef.current){winRef.current.style.left=nx+"px";winRef.current.style.top=ny+"px";} };
    const up = () => { dragging.current=false; window.removeEventListener("mousemove",mv); window.removeEventListener("mouseup",up); };
    window.addEventListener("mousemove",mv); window.addEventListener("mouseup",up);
  }
  function startResize(e) {
    e.preventDefault(); e.stopPropagation(); if(onFocus) onFocus(); resizing.current = true;
    rOrig.current = {mx:e.clientX,my:e.clientY,w:sizeRef.current.w,h:sizeRef.current.h};
    const mv = ev => { if(!resizing.current) return; const nw=Math.max(minW,rOrig.current.w+(ev.clientX-rOrig.current.mx)), nh=Math.max(minH,rOrig.current.h+(ev.clientY-rOrig.current.my)); sizeRef.current={w:nw,h:nh}; if(winRef.current){winRef.current.style.width=nw+"px";winRef.current.style.height=nh+"px";} };
    const up = () => { resizing.current=false; window.removeEventListener("mousemove",mv); window.removeEventListener("mouseup",up); };
    window.addEventListener("mousemove",mv); window.addEventListener("mouseup",up);
  }

  if (minimized) return null;
  const p = posRef.current, sz = sizeRef.current;
  return html`
    <div ref=${winRef} onMouseDown=${()=>{if(onFocus)onFocus();}}
      style=${{position:"absolute",left:p.x,top:p.y,width:sz.w,height:sz.h,zIndex:zIdx||10,display:"flex",flexDirection:"column",background:"rgba(9,9,12,0.98)",border:"1px solid rgba(255,255,255,0.09)",borderRadius:12,boxShadow:"0 24px 70px rgba(0,0,0,0.8)",overflow:"hidden",userSelect:"none",pointerEvents:"all"}}>
      <div onMouseDown=${startDrag}
        style=${{display:"flex",alignItems:"center",gap:7,padding:"8px 11px",background:"rgba(255,255,255,0.025)",borderBottom:"1px solid rgba(255,255,255,0.06)",cursor:"grab",flexShrink:0}}>
        <span style=${{fontSize:11,color:color||"#fff",fontFamily:"monospace",opacity:0.8}}>${icon}</span>
        <span style=${{flex:1,fontSize:12,fontWeight:700,color:"rgba(255,255,255,0.65)",letterSpacing:"0.04em",pointerEvents:"none"}}>${title}</span>
        ${hdrExtra && html`<div data-nd style=${{marginRight:4}}>${hdrExtra}</div>`}
        <div data-nd style=${{display:"flex",gap:4}}>
          <button onClick=${onMin} style=${{width:17,height:17,borderRadius:"50%",background:"rgba(230,170,50,0.8)",border:"none",cursor:"pointer",fontSize:10,color:"#000",display:"flex",alignItems:"center",justifyContent:"center"}}>-</button>
          <button onClick=${onClose} style=${{width:17,height:17,borderRadius:"50%",background:"rgba(210,60,55,0.8)",border:"none",cursor:"pointer",fontSize:10,color:"#fff",display:"flex",alignItems:"center",justifyContent:"center"}}>x</button>
        </div>
      </div>
      <div style=${{flex:1,overflow:"hidden",display:"flex",flexDirection:"column"}}>${children}</div>
      <div onMouseDown=${startResize} style=${{position:"absolute",bottom:0,right:0,width:14,height:14,cursor:"se-resize"}}/>
    </div>`;
}

// Normalize Firestore community doc → adds .members alias for .memberIds
function normComm(d) {
  const memberIds = d.memberIds || d.members || [];
  return {...d, memberIds, members:memberIds};
}
// Normalize groupChat doc → adds .members/.pendingMembers aliases
function normChat(d) {
  const memberIds = d.memberIds || d.members || [];
  const pendingMemberIds = d.pendingMemberIds || d.pendingMembers || [];
  return {...d, memberIds, members:memberIds, pendingMemberIds, pendingMembers:pendingMemberIds};
}
// Normalize DM doc → adds .participants alias for .participantIds
function normDM(d) {
  const participantIds = d.participantIds || d.participants || [];
  return {...d, participantIds, participants:participantIds};
}

        <div style=${{fontSize:10,letterSpacing:"0.16em",textTransform:"uppercase",color:"rgba(255,255,255,0.28)",marginBottom:20}}>Entrar</div>

          </div>
          <div><${FLbl}>Senha<//>
            <input value=${password} onChange=${e=>setPassword(e.target.value)} type="password" placeholder="Sua senha" style=${S.fIn}
              onKeyDown=${e=>{if(e.key==="Enter") doLogin();}}/>
          </div>
          ${error && html`<div style=${{fontSize:12,color:"rgba(220,80,80,0.9)",background:"rgba(200,60,60,0.1)",border:"1px solid rgba(200,60,60,0.2)",borderRadius:8,padding:"8px 12px"}}>${error}</div>`}

function ProfileContent({userId,getUser,userChars,communities,currentUserId,onSetPhoto,onToggleVIP,myVIP,onSaveName}) {
  const user=getUser(userId), char=userChars[userId]||null, hue=CLASS_HUE[user.cls]||240;
  const mc=(communities||[]).filter(c=>(c.members||c.memberIds||[]).includes(userId));
  const isOwn = userId===currentUserId;
  const isVIP = !!(user.vip || (char&&char.vip));
  const fileRef = React.useRef(null);
  const [editingName, setEditingName] = useState(false);
  const [nameDraft,   setNameDraft]   = useState(user.name||"");

  function saveName() {
    const n = nameDraft.trim();
    if (!n) { setNameDraft(user.name||""); setEditingName(false); return; }
    if (onSaveName) onSaveName(n);
    setEditingName(false);
  }

  return html`
    <div style=${{flex:1,overflowY:"auto",padding:"16px 18px"}}>
      <div style=${{display:"flex",gap:14,alignItems:"center",marginBottom:18,padding:"14px 16px",background:hsl(hue,25,7),border:"1px solid "+hsl(hue,35,16),borderRadius:12}}>
        <div style=${{position:"relative",flexShrink:0}}>
          ${user.photo
            ? html`<img src=${user.photo} alt=${user.name} style=${{width:52,height:52,borderRadius:14,objectFit:"cover",border:"1px solid "+hsl(hue,38,22),display:"block"}}/>`
            : html`<div style=${{width:52,height:52,borderRadius:14,background:hsl(hue,28,12),border:"1px solid "+hsl(hue,38,22),display:"flex",alignItems:"center",justifyContent:"center",fontSize:26,color:hsl(hue,60,62)}}>${CSYM[user.cls]||"✦"}</div>`}
          ${isOwn && html`
            <button title="Alterar foto" onClick=${()=>fileRef.current&&fileRef.current.click()} style=${{position:"absolute",bottom:-4,right:-4,width:20,height:20,borderRadius:"50%",background:"rgba(9,9,12,0.95)",border:"1px solid rgba(255,255,255,0.2)",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10}}>foto</button>
            <input ref=${fileRef} type="file" accept="image/*" style=${{display:"none"}} onChange=${e=>{const f=e.target.files&&e.target.files[0];if(f&&onSetPhoto) compressPhoto(f,onSetPhoto);e.target.value="";}}/>
          `}
        </div>
        <div style=${{flex:1,minWidth:0}}>
          ${isOwn
            ? editingName
              ? html`
                <div style=${{display:"flex",gap:6,alignItems:"center",marginBottom:4}}>
                  <input value=${nameDraft} onChange=${e=>setNameDraft(e.target.value)}
                    onKeyDown=${e=>{if(e.key==="Enter")saveName();if(e.key==="Escape"){setNameDraft(user.name||"");setEditingName(false);}}}
                    autoFocus maxLength=${32}
                    style=${{flex:1,background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.2)",borderRadius:7,padding:"6px 10px",color:"rgba(255,255,255,0.92)",fontSize:16,fontWeight:800,outline:"none",fontFamily:"inherit"}}/>
                  <button onClick=${saveName} style=${{...S.gmb,fontSize:12,padding:"5px 10px",color:"rgba(80,200,110,0.9)",borderColor:"rgba(80,200,110,0.3)"}}>✓</button>
                  <button onClick=${()=>{setNameDraft(user.name||"");setEditingName(false);}} style=${{...S.gmb,fontSize:12,padding:"5px 9px"}}>✕</button>
                </div>`
              : html`
                <div style=${{display:"flex",alignItems:"center",gap:6,marginBottom:2}}>
                  <div style=${{fontSize:18,fontWeight:800,color:"rgba(255,255,255,0.92)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",flex:1}}>${user.name}</div>
                  <button onClick=${()=>{setNameDraft(user.name||"");setEditingName(true);}} title="Editar nome"
                    style=${{background:"none",border:"none",color:"rgba(255,255,255,0.28)",cursor:"pointer",fontSize:13,lineHeight:1,flexShrink:0,padding:"2px"}}>✏</button>
                </div>`
            : html`<div style=${{fontSize:18,fontWeight:800,color:"rgba(255,255,255,0.92)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>${user.name}</div>`}
          <div style=${{fontSize:11,color:"rgba(255,255,255,0.34)",marginTop:3,textTransform:"uppercase",letterSpacing:"0.08em"}}>${user.race} · ${user.cls}</div>
          ${char&&html`<div style=${{fontSize:11,color:"rgba(255,255,255,0.28)",marginTop:2}}>Nível ${char.lvl||1} · ${char.xp||0} XP</div>`}
          ${isOwn && !editingName && html`<div style=${{fontSize:9,color:"rgba(255,255,255,0.18)",marginTop:3}}>Toque em ✏ para editar o nome</div>`}
        </div>
      </div>
      ${char && html`
        <div>
          <div style=${{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:7,marginBottom:16}}>
            ${[["HP",char.hp+"/"+char.mhp,"rgba(80,200,110,0.9)"],["CA",char.ac,"rgba(100,160,240,0.9)"],["PO",char.gold,"rgba(210,170,50,0.9)"],["Nível",char.lvl||1,"rgba(255,255,255,0.72)"],["Prof.","+"+char.prof,"rgba(255,255,255,0.72)"],["XP",char.xp||0,"rgba(180,120,240,0.9)"]].map(([l,v,c])=>html`

                <div style=${{fontSize:9,color:"rgba(255,255,255,0.28)",textTransform:"uppercase",letterSpacing:"0.08em"}}>${l}</div>
                <div style=${{fontSize:15,fontWeight:800,color:c,marginTop:2}}>${v}</div>
              </div>`)}
          </div>
          <div style=${{display:"grid",gridTemplateColumns:"repeat(6,1fr)",gap:4,marginBottom:16}}>

                <div style=${{fontSize:8,color:"rgba(255,255,255,0.28)",textTransform:"uppercase"}}>${a.s}</div>
                <div style=${{fontSize:13,fontWeight:800,color:"rgba(255,255,255,0.7)",margin:"2px 0"}}>${char[a.k]||10}</div>
                <div style=${{fontSize:9,color:modN(char[a.k]||10)>=0?"rgba(90,195,115,0.9)":"rgba(215,75,65,0.9)"}}>${modStr(char[a.k]||10)}</div>
              </div>`)}
          </div>
          ${(char.conditions||[]).length>0 && html`<div style=${{marginBottom:12}}><div style=${{fontSize:9,color:"rgba(255,255,255,0.24)",marginBottom:6,textTransform:"uppercase",letterSpacing:"0.12em"}}>Condições</div><div style=${{display:"flex",flexWrap:"wrap",gap:4}}>${char.conditions.map(c=>html`<span key=${c} style=${{padding:"3px 9px",borderRadius:12,fontSize:11,background:"rgba(200,60,60,0.18)",border:"1px solid rgba(200,60,60,0.3)",color:"rgba(220,120,120,0.9)"}}>${c}</span>`)}</div></div>`}

        </div>`}

// ── SHEET BUILDER ─────────────────────────────────────────────────────────────
function SheetBuilder({initialSheet,onSave,onClose}) {
  const [name, setName] = useState(initialSheet?initialSheet.name:"Ficha da Campanha");
  const [fields, setFields] = useState(initialSheet?initialSheet.fields:[]);
  const [newType, setNewType] = useState("text");
  const [newLabel, setNewLabel] = useState("");
  const [newOptions, setNewOptions] = useState("");
  const [newMax, setNewMax] = useState("10");
  function addField() {
    if(!newLabel.trim()&&newType!=="section") return;
    const f = {id:"f_"+uid(),type:newType,label:newLabel.trim()||"Seção"};
    if(newType==="select") f.options=newOptions.split(",").map(o=>o.trim()).filter(Boolean);
    if(newType==="resource"){f.max=parseInt(newMax)||10;f.cur=parseInt(newMax)||10;}
    setFields(fs=>[...fs,f]); setNewLabel(""); setNewOptions(""); setNewMax("10");
  }
  return html`
    <div style=${{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.85)",zIndex:2000,backdropFilter:"blur(6px)",display:"flex",alignItems:"center",justifyContent:"center"}}
      onClick=${e=>{if(e.target===e.currentTarget) onClose();}}>
      <div style=${{background:"#0c0c0f",border:"1px solid rgba(255,255,255,0.1)",borderRadius:14,width:"min(780px,95vw)",height:"88vh",display:"flex",flexDirection:"column",overflow:"hidden",animation:"fadeUp 0.25s ease both"}}>
        <div style=${{display:"flex",alignItems:"center",gap:10,padding:"14px 18px",borderBottom:"1px solid rgba(255,255,255,0.07)",flexShrink:0}}>
          <input value=${name} onChange=${e=>setName(e.target.value)} style=${{flex:1,fontSize:15,fontWeight:700,background:"transparent",border:"none",padding:"2px 0",outline:"none",fontFamily:"inherit",color:"rgba(255,255,255,0.85)"}}/>
          <button onClick=${()=>onSave({id:(initialSheet&&initialSheet.id)||"cs_"+uid(),name:name.trim()||"Ficha",fields})} style=${S.btnP}>💾 Salvar</button>
          <button onClick=${onClose} style=${{background:"none",border:"none",color:"rgba(255,255,255,0.4)",cursor:"pointer",fontSize:22,lineHeight:1}}>×</button>
        </div>
        <div style=${{flex:1,display:"flex",overflow:"hidden"}}>
          <div style=${{flex:1,overflowY:"auto",padding:"14px 16px"}}>
            <div style=${{fontSize:9,letterSpacing:"0.14em",textTransform:"uppercase",color:"rgba(255,255,255,0.28)",marginBottom:10}}>Campos (${fields.length})</div>
            ${fields.length===0&&html`<div style=${{padding:"20px",textAlign:"center",color:"rgba(255,255,255,0.22)",fontSize:12,border:"1px dashed rgba(255,255,255,0.08)",borderRadius:10}}>Nenhum campo. Adicione ao lado.</div>`}
            ${fields.map((f,i)=>html`
              <div key=${f.id} style=${{display:"flex",alignItems:"center",gap:8,padding:"9px 12px",background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:9,marginBottom:6}}>
                <div style=${{width:22,height:22,borderRadius:6,background:"rgba(255,255,255,0.07)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,color:"rgba(255,255,255,0.5)",flexShrink:0}}>${(FIELD_TYPES.find(t=>t.id===f.type)||{icon:"?"}).icon}</div>
                <div style=${{flex:1}}>
                  <div style=${{fontSize:13,color:"rgba(255,255,255,0.78)"}}>${f.label}</div>
                  <div style=${{fontSize:10,color:"rgba(255,255,255,0.3)",marginTop:1}}>${(FIELD_TYPES.find(t=>t.id===f.type)||{label:"?"}).label}${f.type==="select"?" · "+f.options.join(", "):""}${f.type==="resource"?" · máx: "+f.max:""}</div>
                </div>
                <button onClick=${()=>setFields(fs=>fs.filter(x=>x.id!==f.id))} style=${{background:"none",border:"none",color:"rgba(200,80,80,0.7)",cursor:"pointer",fontSize:14}}>×</button>
              </div>`)}
          </div>
          <div style=${{width:240,flexShrink:0,borderLeft:"1px solid rgba(255,255,255,0.07)",padding:"14px",overflowY:"auto",background:"rgba(255,255,255,0.01)"}}>
            <div style=${{fontSize:9,letterSpacing:"0.14em",textTransform:"uppercase",color:"rgba(255,255,255,0.28)",marginBottom:10}}>Adicionar Campo</div>
            <${FLbl}>Tipo<//>
            <div style=${{display:"grid",gridTemplateColumns:"1fr 1fr",gap:5,marginBottom:12}}>
              ${FIELD_TYPES.map(t=>html`
                <button key=${t.id} onClick=${()=>setNewType(t.id)} style=${{display:"flex",alignItems:"center",gap:5,padding:"7px 8px",borderRadius:8,cursor:"pointer",fontFamily:"inherit",fontSize:11,border:"1px solid "+(newType===t.id?"rgba(100,180,240,0.5)":"rgba(255,255,255,0.08)"),background:newType===t.id?"rgba(100,180,240,0.1)":"rgba(255,255,255,0.03)",color:newType===t.id?"rgba(100,180,240,0.9)":"rgba(255,255,255,0.55)"}}>
                  <span style=${{fontFamily:"monospace"}}>${t.icon}</span>${t.label}
                </button>`)}
            </div>
            ${newType!=="section"&&html`<div><${FLbl}>Nome<//>  <input value=${newLabel} onChange=${e=>setNewLabel(e.target.value)} onKeyDown=${e=>{if(e.key==="Enter") addField();}} placeholder="ex: Vida" style=${{...S.fIn,marginBottom:10,padding:"7px 10px",fontSize:12}}/></div>`}
            ${newType==="select"&&html`<div><${FLbl}>Opções (vírgula)<//>  <input value=${newOptions} onChange=${e=>setNewOptions(e.target.value)} placeholder="Op1, Op2" style=${{...S.fIn,marginBottom:10,padding:"7px 10px",fontSize:12}}/></div>`}
            ${newType==="resource"&&html`<div><${FLbl}>Máximo<//>  <input value=${newMax} onChange=${e=>setNewMax(e.target.value)} type="number" min="1" style=${{...S.fIn,marginBottom:10,padding:"7px 10px",fontSize:12}}/></div>`}
            <button onClick=${addField} style=${{...S.btnP,width:"100%",justifyContent:"center",fontSize:12}}>+ Adicionar</button>
          </div>
        </div>
      </div>
    </div>`;
}

// ── CUSTOM SHEET FILLER ───────────────────────────────────────────────────────
function CustomSheetFiller({sheet,data,onUpdate}) {
  if(!sheet||!sheet.fields||!sheet.fields.length) return html`<${Muted} icon="📋" label="Ficha vazia" sub="O mestre ainda nao adicionou campos"/>`;
  return html`
    <div style=${{flex:1,overflowY:"auto",padding:"14px 16px"}}>
      <div style=${{fontSize:12,fontWeight:700,color:"rgba(255,255,255,0.72)",marginBottom:14}}>${sheet.name}</div>
      ${sheet.fields.map(f=>{
        const val=data[f.id];
        if(f.type==="section") return html`<div key=${f.id} style=${{fontSize:9,letterSpacing:"0.14em",textTransform:"uppercase",color:"rgba(255,255,255,0.28)",borderBottom:"1px solid rgba(255,255,255,0.07)",paddingBottom:5,marginBottom:10,marginTop:14}}>${f.label}</div>`;
        return html`
          <div key=${f.id} style=${{marginBottom:10}}>
            <${FLbl}>${f.label}<//>
            ${f.type==="text" && html`<input value=${val||""} onChange=${e=>onUpdate(f.id,e.target.value)} placeholder=${f.label+"..."} style=${S.fIn}/>`}
            ${f.type==="number" && html`<input value=${val||""} onChange=${e=>onUpdate(f.id,e.target.value)} type="number" style=${{...S.fIn,width:"auto",minWidth:80,textAlign:"center"}}/>`}
            ${f.type==="textarea" && html`<textarea value=${val||""} onChange=${e=>onUpdate(f.id,e.target.value)} rows=${3} style=${{...S.fIn,resize:"vertical",lineHeight:1.65}}/>`}
            ${f.type==="checkbox" && html`
              <button onClick=${()=>onUpdate(f.id,!val)} style=${{display:"flex",alignItems:"center",gap:8,background:"none",border:"none",cursor:"pointer",fontFamily:"inherit",padding:0}}>
                <div style=${{width:20,height:20,borderRadius:5,border:"1.5px solid "+(val?"rgba(100,200,100,0.8)":"rgba(255,255,255,0.22)"),background:val?"rgba(100,200,100,0.2)":"transparent",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,transition:"all 0.15s",flexShrink:0}}>${val?"✓":""}</div>
                <span style=${{fontSize:13,color:val?"rgba(100,200,100,0.9)":"rgba(255,255,255,0.4)"}}>${val?"Sim":"Não"}</span>
              </button>`}
            ${f.type==="select" && html`
              <div style=${{display:"flex",flexWrap:"wrap",gap:5}}>
                ${(f.options||[]).map(opt=>html`<button key=${opt} onClick=${()=>onUpdate(f.id,opt)} style=${{padding:"5px 12px",borderRadius:20,cursor:"pointer",fontFamily:"inherit",fontSize:12,border:"1px solid "+(val===opt?"rgba(100,180,240,0.5)":"rgba(255,255,255,0.09)"),background:val===opt?"rgba(100,180,240,0.12)":"rgba(255,255,255,0.03)",color:val===opt?"rgba(100,180,240,0.9)":"rgba(255,255,255,0.5)"}}>${opt}</button>`)}
              </div>`}
            ${f.type==="resource" && (()=>{
              const cur=parseInt(val)||f.max||10, max=f.max||10, pct=Math.max(0,Math.min(1,cur/max));
              const col=pct>0.5?"rgba(80,200,110,0.85)":pct>0.25?"rgba(230,170,50,0.85)":"rgba(220,70,60,0.85)";
              return html`
                <div>
                  <div style=${{height:7,background:"rgba(255,255,255,0.06)",borderRadius:4,overflow:"hidden",marginBottom:5}}><div style=${{height:"100%",width:(pct*100)+"%",background:col,borderRadius:4,transition:"width 0.3s"}}/></div>
                  <div style=${{display:"flex",alignItems:"center",gap:8}}>
                    <button onClick=${()=>onUpdate(f.id,Math.max(0,cur-1))} style=${S.micro}>−</button>
                    <span style=${{fontSize:14,fontWeight:700,color:col,minWidth:60,textAlign:"center"}}>${cur} / ${max}</span>
                    <button onClick=${()=>onUpdate(f.id,Math.min(max,cur+1))} style=${S.micro}>+</button>
                  </div>
                </div>`;
            })()}
          </div>`;})}
    </div>`;
}

// ── APP ROOT ─────────────────────────────────────────────────────────────────
function App() {
  const [authUser,setAuthUser]       = useState(null);
  const [authLoading,setAuthLoading] = useState(true);
  const [currentUser,setCU]          = useState(null);
  const [sideView,setSideView]       = useState("feed");

  const [activeChatId,setActiveChatId]= useState(null);
  const [activeSV,setActiveSV]       = useState("");
  const [activeDMId,setActiveDMId]   = useState(null);
  const [modal,setModal]             = useState(null);
  const [mobilePanel,setMobilePanel] = useState(null);
  const [toast,setToast]             = useState(null);
  const [sheetOpen,setSheetOpen]     = useState(false);
  const [profileUID,setProfileUID]   = useState(null);
  const [sheetBuilderOpen,setSheetBuilderOpen] = useState(null);
  const [lvlUpAnim,setLvlUpAnim]     = useState(null);
  const [feedSearch,setFeedSearch]   = useState("");
  const [unread,setUnread]           = useState({});
  const [pendingInvite,setPendingInvite] = useState(null);
  const [customSheets,setCustomSheets]= useState({});
  const [turnIndex,setTurnIndex]     = useState({});
  const [adminOpen,setAdminOpen]     = useState(false);
  const [appConfig,setAppConfig]     = useState({});
  const [communities,setComm]        = useState([]);
  const [activePosts,setActivePosts] = useState([]);
  const [activeGroupChats,setActiveGroupChats] = useState([]);
  const [activeChatMsgs,setActiveChatMsgs]     = useState([]);
  const [dms,setDms]                 = useState([]);
  const [activeDMMsgs,setActiveDMMsgs]         = useState([]);
  const toastTimer = useRef(null);
  const userCache  = useRef({});
  const [tick,setTick] = useState(0);

  const isSuperAdmin = authUser && isAdminUser(authUser.email);
  const userChars = useMemo(()=>{
    const m={};
    if(currentUser&&authUser) m[authUser.id]=currentUser.char||{};
    Object.values(userCache.current).forEach(u=>{if(u&&u.char)m[u.id]=u.char;});
    return m;
  },[currentUser,tick]);

  function notify(msg){clearTimeout(toastTimer.current);setToast(msg);toastTimer.current=setTimeout(()=>setToast(null),2800);}

  function getUser(uid2){
    if(!uid2)return{id:"",name:"Usuário",cls:"Guerreiro",race:"Humano"};
    if(userCache.current[uid2])return userCache.current[uid2];
    sb.from("users").select("*").eq("id",uid2).single().then(({data})=>{
      if(data){userCache.current[uid2]=userFromDB(data);setTick(t=>t+1);}
    }).catch(()=>{});
    return{id:uid2,name:"...",cls:"Guerreiro",race:"Humano"};
  }

  useEffect(()=>{
    sb.auth.getSession().then(({data:{session}})=>{setAuthUser(session?.user||null);setAuthLoading(false);});
    const{data:{subscription}}=sb.auth.onAuthStateChange((_,session)=>{setAuthUser(session?.user||null);setAuthLoading(false);if(!session)setCU(null);});
    return()=>subscription.unsubscribe();
  },[]);

  useEffect(()=>{
    const load=async()=>{const{data}=await sb.from("app_config").select("*").eq("id","global").single();if(data)setAppConfig(configFromDB(data));};
    load();
    const ch=sb.channel("appcfg").on("postgres_changes",{event:"*",schema:"public",table:"app_config"},load).subscribe();
    return()=>sb.removeChannel(ch);
  },[]);

  useEffect(()=>{const inv=getInviteParam();if(inv){setPendingInvite(inv);clearInviteParam();};},[]);

  useEffect(()=>{
    if(!authUser)return;
    const load=async()=>{
      const{data}=await sb.from("users").select("*").eq("id",authUser.id).single();
      if(data){const p=userFromDB(data);userCache.current[authUser.id]=p;setCU(p);setTick(t=>t+1);}
      else{
        const n="Aventureiro";
        const p={id:authUser.id,name:n,cls:"Guerreiro",race:"Humano",photo:null,vip:false,global_banned:false,
          char_data:{name:n,cls:"Guerreiro",race:"Humano",align:"Neutro Bom",lvl:1,xp:0,hp:12,mhp:12,ac:10,
            str:10,dex:10,con:10,int:10,wis:10,cha:10,prof:2,gold:15,skills:{},
            inv:["Espada longa","Mochila","Ração × 5"],notes:"",conditions:[],spells:[],spellSlots:[]}};
        await sb.from("users").upsert(p);
        const prof=userFromDB(p);userCache.current[authUser.id]=prof;setCU(prof);
      }
    };
    load();
    const ch=sb.channel("profile-"+authUser.id).on("postgres_changes",{event:"*",schema:"public",table:"users",filter:"id=eq."+authUser.id},load).subscribe();
    return()=>sb.removeChannel(ch);
  },[authUser&&authUser.id]);

  useEffect(()=>{
    if(!authUser)return;
    const load=async()=>{
      const{data}=await sb.from("communities").select("*").order("created_at",{ascending:false});
      if(data){
        const list=data.map(communityFromDB);
        list.sort((a,b)=>{
          const aIn=(a.memberIds||[]).includes(authUser.id)?1:0;
          const bIn=(b.memberIds||[]).includes(authUser.id)?1:0;
          if(bIn!==aIn)return bIn-aIn;
          return(b.memberIds||[]).length-(a.memberIds||[]).length;
        });
        setComm(list);
      }
    };
    load();
    const ch=sb.channel("comms-"+authUser.id).on("postgres_changes",{event:"*",schema:"public",table:"communities"},load).subscribe();
    return()=>sb.removeChannel(ch);
  },[authUser&&authUser.id]);

  useEffect(()=>{
    if(!activeCID){setActivePosts([]);return;}
    const load=async()=>{const{data}=await sb.from("posts").select("*").eq("community_id",activeCID).order("created_at",{ascending:false});if(data)setActivePosts(data.map(postFromDB));};
    load();
    const ch=sb.channel("posts-"+activeCID).on("postgres_changes",{event:"*",schema:"public",table:"posts",filter:"community_id=eq."+activeCID},load).subscribe();
    return()=>sb.removeChannel(ch);
  },[activeCID]);
